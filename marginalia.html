<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#fbf8f1" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#15110d" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Marginalia">
<title>Marginalia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* =====================================================================
   *  Marginalia — Instapaper-geïnspireerde leesomgeving voor highlights.
   *  Twee thema's, automatisch geactiveerd via prefers-color-scheme of
   *  expliciet via een toggle (state in localStorage).
   * ===================================================================== */

  :root{
    /* ── Light theme (warm paper) ─────────────────────────────────── */
    --bg:          #fbf8f1;
    --bg-soft:     #f4efe5;
    --text:        #1a1a1a;
    --text-soft:   #4a4540;
    --text-muted:  #8c857c;
    --accent:      #b87333;       /* warme sepia */
    --accent-soft: #d9a878;
    --highlight:   #fff1b8;       /* gele markeerstift, mild */
    --rule:        #e6dfd0;
    --rule-soft:   #efe9da;

    --serif: "Lora", "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    --sans:  "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

    --measure: 38rem;             /* leesbreedte ~ 65 tekens */
  }

  :root[data-theme="dark"]{
    --bg:          #15110d;
    --bg-soft:     #1d1813;
    --text:        #e8e3d8;
    --text-soft:   #b8b1a4;
    --text-muted:  #807870;
    --accent:      #d4a06a;
    --accent-soft: #b88955;
    --highlight:   #4a3a14;       /* gedempte highlight-tint in donker */
    --rule:        #2e2820;
    --rule-soft:   #251f18;
  }

  /* Volg systeem als de gebruiker geen voorkeur heeft uitgesproken */
  @media (prefers-color-scheme: dark){
    :root:not([data-theme]){
      --bg:          #15110d;
      --bg-soft:     #1d1813;
      --text:        #e8e3d8;
      --text-soft:   #b8b1a4;
      --text-muted:  #807870;
      --accent:      #d4a06a;
      --accent-soft: #b88955;
      --highlight:   #4a3a14;
      --rule:        #2e2820;
      --rule-soft:   #251f18;
    }
  }

  *,*::before,*::after{ box-sizing: border-box }

  html, body{ margin:0; padding:0; }
  body{
    font-family: var(--serif);
    color: var(--text);
    background: var(--bg);
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    line-height: 1.6;
    min-height: 100vh;
    transition: background-color .25s ease, color .25s ease;
  }

  ::selection{ background: var(--highlight); color: var(--text); }

  /* ── layout ─────────────────────────────────────────────────────── */
  .wrap{
    max-width: var(--measure);
    margin: 0 auto;
    padding: 32px 24px 120px;
  }

  /* ── masthead ───────────────────────────────────────────────────── */
  header.masthead{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding-bottom: 20px;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--rule);
  }
  .brand h1{
    font-family: var(--serif);
    font-weight: 600;
    font-style: italic;
    font-size: 24px;
    letter-spacing: -0.01em;
    margin: 0;
    color: var(--text);
  }
  .mast-right{
    display: flex; align-items: center; gap: 18px;
    font-family: var(--sans);
    font-size: 12px;
    color: var(--text-muted);
  }
  .meta{ letter-spacing: .02em }
  .theme-toggle{
    background: transparent; border: 0; padding: 6px;
    cursor: pointer; color: var(--text-muted);
    line-height: 1; border-radius: 4px;
    transition: color .15s ease, background-color .15s ease;
  }
  .theme-toggle:hover{ color: var(--text); background: var(--bg-soft); }
  .theme-toggle svg{ display: block; width: 18px; height: 18px; }

  /* ── tabs ───────────────────────────────────────────────────────── */
  nav.tabs{
    display: flex; gap: 28px;
    margin-bottom: 36px;
    font-family: var(--sans);
  }
  nav.tabs button{
    background: none; border: 0;
    padding: 6px 0;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: .02em;
    color: var(--text-muted);
    cursor: pointer;
    position: relative;
    transition: color .15s ease;
  }
  nav.tabs button:hover{ color: var(--text-soft); }
  nav.tabs button.active{ color: var(--text); }
  nav.tabs button.active::after{
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -2px; height: 1px;
    background: var(--accent);
  }

  /* ── highlight item ─────────────────────────────────────────────── */
  article.hl{
    padding: 28px 0 32px;
    border-bottom: 1px solid var(--rule-soft);
    position: relative;
  }
  article.hl:last-child{ border-bottom: 0; }

  article.hl .text{
    font-family: var(--serif);
    font-size: 19px;
    line-height: 1.65;
    color: var(--text);
    margin: 0 0 14px;
    font-weight: 400;
  }
  /* Eerste teken iets prominenter, als een drop-cap-light */
  article.hl .text::first-letter{
    font-style: italic;
  }

  article.hl .note{
    font-family: var(--serif);
    font-style: italic;
    font-size: 15px;
    line-height: 1.55;
    color: var(--text-soft);
    margin: 12px 0 16px;
    padding-left: 16px;
    border-left: 2px solid var(--accent-soft);
  }
  article.hl .note::before{
    content: "Aantekening · ";
    font-style: normal;
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--text-muted);
    margin-right: 6px;
  }

  article.hl footer{
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
    margin-top: 18px;
    font-family: var(--sans);
    font-size: 12px;
    color: var(--text-muted);
  }
  article.hl .src{
    display: flex; align-items: baseline; gap: 8px;
    flex: 1 1 auto; min-width: 0;
  }
  article.hl .src .badge{
    font-family: var(--sans);
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  article.hl .src .title{
    font-family: var(--serif);
    font-style: italic;
    font-size: 13.5px;
    color: var(--text-soft);
    text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
    max-width: 100%;
  }
  article.hl .src .author{
    color: var(--text-muted);
    font-style: normal;
  }
  article.hl .src .author::before{ content: " · "; }
  article.hl .src a.title{
    text-decoration: none;
    border-bottom: 1px dotted var(--rule);
  }
  article.hl .src a.title:hover{
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .actions{ display: flex; gap: 16px; flex-shrink: 0; }
  .actions button{
    background: none; border: 0; padding: 6px 0;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .02em;
    color: var(--text-muted);
    cursor: pointer;
    transition: color .15s ease;
  }
  .actions button:hover{ color: var(--text); }
  .actions button.fav.on{ color: var(--accent); }

  /* ── daily view ─────────────────────────────────────────────────── */
  .daily-head{
    display: flex; align-items: baseline; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
    margin-bottom: 20px;
  }
  .daily-head h2{
    font-family: var(--serif);
    font-weight: 400;
    font-style: italic;
    font-size: 20px;
    color: var(--text-soft);
    margin: 0;
    letter-spacing: -0.005em;
  }
  .reshuffle{
    background: none; border: 0;
    padding: 4px 0;
    font-family: var(--sans);
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 1px dotted var(--rule);
    transition: color .15s ease, border-color .15s ease;
  }
  .reshuffle:hover{ color: var(--accent); border-bottom-color: var(--accent); }

  /* ── browse view ────────────────────────────────────────────────── */
  .browse-head{
    display: flex; flex-direction: column; gap: 16px;
    margin-bottom: 28px;
  }
  .search{
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--rule);
    padding: 6px 0 8px;
  }
  .search input{
    flex: 1;
    background: transparent;
    border: 0; outline: none;
    font-family: var(--serif);
    font-size: 17px;
    color: var(--text);
    padding: 4px 0;
  }
  .search input::placeholder{ color: var(--text-muted); font-style: italic; }
  .search .count{
    font-family: var(--sans);
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .filters{ display: flex; gap: 18px; flex-wrap: wrap; }
  .chip{
    background: none; border: 0;
    padding: 4px 0;
    font-family: var(--sans);
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 1px solid transparent;
    transition: color .15s ease, border-color .15s ease;
  }
  .chip:hover{ color: var(--text-soft); }
  .chip.active{ color: var(--text); border-bottom-color: var(--accent); }

  details.book{
    margin-bottom: 8px;
    border-bottom: 1px solid var(--rule);
  }
  details.book summary{
    cursor: pointer; list-style: none;
    padding: 18px 0;
    display: flex; align-items: baseline; gap: 14px;
  }
  details.book summary::-webkit-details-marker{ display: none; }
  details.book summary::before{
    content: "→";
    font-family: var(--sans);
    font-size: 14px;
    color: var(--text-muted);
    transition: transform .25s ease;
    display: inline-block;
    line-height: 1;
    flex-shrink: 0;
  }
  details.book[open] summary::before{ transform: rotate(90deg); }
  details.book .booktitle{
    font-family: var(--serif);
    font-style: italic;
    font-size: 18px;
    color: var(--text);
    flex: 1;
  }
  details.book .bookauthor{
    font-family: var(--serif);
    font-size: 14px;
    color: var(--text-muted);
  }
  details.book .bookcount{
    font-family: var(--sans);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: .04em;
  }
  details.book .book-items{ padding: 0 0 8px; }
  details.book .book-items article.hl:first-child{ padding-top: 8px; }

  /* ── empty / loader ─────────────────────────────────────────────── */
  .empty{
    text-align: center; padding: 80px 20px;
    color: var(--text-muted);
    font-style: italic;
    font-size: 16px;
  }
  .loader{
    border: 1px dashed var(--rule);
    border-radius: 2px;
    padding: 48px 32px;
    text-align: center;
    background: var(--bg-soft);
  }
  .loader h2{
    font-family: var(--serif);
    font-style: italic;
    font-weight: 500;
    font-size: 22px;
    margin: 0 0 10px;
    color: var(--text);
  }
  .loader p{ color: var(--text-soft); margin: 0 0 22px; font-size: 14px; }
  .loader.drag{ background: var(--bg); border-color: var(--accent); }
  .filebtn{
    display: inline-block;
    background: var(--text); color: var(--bg);
    padding: 10px 20px;
    border-radius: 2px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    cursor: pointer;
    border: 0;
    transition: background-color .15s ease;
  }
  .filebtn:hover{ background: var(--accent); }

  /* ── footer ─────────────────────────────────────────────────────── */
  .footbar{
    margin-top: 64px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
    font-family: var(--sans);
    font-size: 11px;
    color: var(--text-muted);
  }
  .footbar button{
    background: none; border: 0;
    cursor: pointer;
    color: var(--text-muted);
    font-family: var(--sans);
    font-size: 11px;
    padding: 4px 0;
    text-decoration: none;
    border-bottom: 1px dotted var(--rule);
    transition: color .15s ease, border-color .15s ease;
  }
  .footbar button:hover{ color: var(--accent); border-bottom-color: var(--accent); }

  /* ── search highlighting ────────────────────────────────────────── */
  mark{
    background: var(--highlight);
    color: inherit;
    padding: 0 2px;
    border-radius: 1px;
  }

  /* ── motion ────────────────────────────────────────────────────── */
  @keyframes rise{
    from{ opacity: 0; transform: translateY(4px); }
    to  { opacity: 1; transform: translateY(0); }
  }
  article.hl{ animation: rise .35s ease both; }
  article.hl:nth-child(2){ animation-delay: .04s; }
  article.hl:nth-child(3){ animation-delay: .08s; }
  article.hl:nth-child(4){ animation-delay: .12s; }
  article.hl:nth-child(5){ animation-delay: .16s; }

  @media (prefers-reduced-motion: reduce){
    article.hl{ animation: none; }
    *{ transition: none !important; }
  }

  /* ── mobile ─────────────────────────────────────────────────────── */
  @media (max-width: 540px){
    .wrap{ padding: 22px 18px 100px; }
    article.hl .text{ font-size: 18px; }
    nav.tabs{ gap: 22px; margin-bottom: 28px; }
    nav.tabs button{ font-size: 14px; padding: 10px 0; }
    .actions button{ padding: 10px 4px; min-height: 40px; font-size: 12px; }
    .chip{ padding: 8px 0; min-height: 36px; }
    .footbar button{ padding: 8px 0; }
    .brand h1{ font-size: 22px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <div class="brand">
      <h1>Marginalia</h1>
    </div>
    <div class="mast-right">
      <span class="meta" id="meta">geen data geladen</span>
      <button class="theme-toggle" id="themetoggle" aria-label="Wissel thema" title="Wissel licht/donker">
        <!-- icon wordt door JS ingevuld -->
      </button>

  <nav class="tabs" id="tabs" hidden>

  <main id="root">

  </main>

  <div class="footbar" id="footbar" hidden>
    <span id="datastamp"></span>
    <span>
      <button id="reload">Andere JSON laden</button>
      &nbsp;·&nbsp;
      <button id="exportfavs">Favorieten exporteren</button>
      &nbsp;·&nbsp;
      <button id="wipe">Lokale opslag wissen</button>
    </span>
  </div>
</div>

<script>window.__EMBEDDED_DATA__ = {"generated_at": "2026-05-06T22:47:43", "count": 256, "highlights": [{"id": "insta-26944979", "source": "instapaper", "text": "Inzicht #4: De markt voor je productief voelen is vele malen groter dan de markt voor daadwerkelijk productief zijn. Op LinkedIn of X zie ik geregeld mensen vertellen over zelfgebouwde AI-tools die in feite niets meer doen dan complexiteit toevoegen aan hun AI-gebruik. Daarom herinner ik mezelf er telkens aan: dien ik nu de technologie of dient de technologie mij?", "note": null, "title": "12 inzichten die je helpen AI te gebruiken zonder je denkvermogen uit handen te geven", "author": null, "url": "https://motivatiemails.intentioneelleven.nl/p/12-inzichten-die-je-helpen-ai-te", "created_at": "2026-05-06T08:57:16", "color": null}, {"id": "insta-26944973", "source": "instapaper", "text": "Ezra Klein haalde in The New York Times recent dit klassieke media-aforisme van stal: ‘We shape our tools and thereafter they shape us’.", "note": null, "title": "12 inzichten die je helpen AI te gebruiken zonder je denkvermogen uit handen te geven", "author": null, "url": "https://motivatiemails.intentioneelleven.nl/p/12-inzichten-die-je-helpen-ai-te", "created_at": "2026-05-06T08:53:23", "color": null}, {"id": "kobo-annot-9182c56c7eb76b68", "source": "kobo", "text": "Laat ze’ is een bewuste keuze om die oerbehoefte aan controle los te laten", "note": null, "title": "The Let Them Theory", "author": "Mel Robbins", "url": null, "created_at": "2026-05-05T20:54:33Z", "color": null}, {"id": "kobo-annot-605e3fa4f2ecc7c2", "source": "kobo", "text": ". En laten we eerlijk zijn, controle schept de illusie van veiligheid.", "note": null, "title": "The Let Them Theory", "author": "Mel Robbins", "url": null, "created_at": "2026-05-05T20:51:50Z", "color": null}, {"id": "kobo-annot-57755c780910d764", "source": "kobo", "text": "In het begin voelden die woorden als een afwijzing. Alsof ik toegaf. Maar toen besefte ik iets belangrijks: ‘laat ze’ ging niet over toegeven. Het ging over mezelf bevrijden van de controle die ik sowieso nooit had.", "note": null, "title": "The Let Them Theory", "author": "Mel Robbins", "url": null, "created_at": "2026-05-05T20:44:10Z", "color": null}, {"id": "kobo-annot-028ea925a6c2e493", "source": "kobo", "text": "Deze theorie kent een tweede, nog belangrijker stap: laat me.", "note": null, "title": "The Let Them Theory", "author": "Mel Robbins", "url": null, "created_at": "2026-05-05T20:35:52Z", "color": null}, {"id": "kobo-annot-d90622e00754a9ca", "source": "kobo", "text": "Maar in werkelijkheid is er één ding waarover je nooit controle zult hebben. Hoe hard je het ook probeert, je zult nooit in staat zijn controle te hebben over een ander mens. Je hebt alleen controle over jezelf. Over je gedachten, je gedrag en je gevoelens.", "note": null, "title": "The Let Them Theory", "author": "Mel Robbins", "url": null, "created_at": "2026-05-04T20:46:56Z", "color": null}, {"id": "kobo-annot-0d1be604ba7ada0a", "source": "kobo", "text": "De theorie is gebaseerd op een fundamentele wet van de menselijke natuur: elk menselijk wezen heeft een aangeboren behoefte aan controle.", "note": null, "title": "The Let Them Theory", "author": "Mel Robbins", "url": null, "created_at": "2026-05-04T20:45:55Z", "color": null}, {"id": "kobo-annot-8dfe01ad4f5cfac4", "source": "kobo", "text": "En waarom het werkt? Als je stopt met je pogingen controle te krijgen over dingen die niet thuishoren bij jou, verspil je je energie niet langer. Je eist je tijd, je gemoedsrust en je focus weer op. Je beseft dat jouw geluk afhangt van wat jij doet, niet van wat een ander doet, denkt of voelt.", "note": null, "title": "The Let Them Theory", "author": "Mel Robbins", "url": null, "created_at": "2026-05-04T20:27:21Z", "color": null}, {"id": "kobo-annot-8b3c9d084891f415", "source": "kobo", "text": "je eigen leven. Niet langer reageren, maar gaan leven. Toen ik leerde volwassenen volwassenen te laten zijn, veranderde dat mijn leven. En dat zal ook gelden voor jou. Maak jezelf niet langer gek door te proberen met andere mensen te dealen of het ze naar de zin te maken, maar leer gewoon ze te laten begaan.", "note": null, "title": "The Let Them Theory", "author": "Mel Robbins", "url": null, "created_at": "2026-05-04T20:26:19Z", "color": null}, {"id": "kobo-annot-b6046108b7831aeb", "source": "kobo", "text": "Als je je niet langer druk maakt om wat anderen denken, zeggen of doen, heb je eindelijk genoeg energie om je te focussen op je eigen leven. Niet langer reageren, maar gaan leven.", "note": null, "title": "The Let Them Theory", "author": "Mel Robbins", "url": null, "created_at": "2026-05-04T20:25:46Z", "color": null}, {"id": "kobo-annot-34e943c2d854af4a", "source": "kobo", "text": "De Let Them-theorie gaat over vrijheid.", "note": null, "title": "The Let Them Theory", "author": "Mel Robbins", "url": null, "created_at": "2026-05-04T20:25:22Z", "color": null}, {"id": "kobo-annot-4e3d1e62dd8288ce", "source": "kobo", "text": "De 5-seconderegel werkt omdat die je helpt de innerlijke strijd te winnen die je met jezelf voert. Maar hij kan niets doen tegen je dagelijkse strijd met de buitenwereld.", "note": null, "title": "The Let Them Theory", "author": "Mel Robbins", "url": null, "created_at": "2026-05-04T20:13:21Z", "color": null}, {"id": "kobo-annot-e0e10e5405f518c5", "source": "kobo", "text": "Je vindt meer informatie over mijn mediaproductiebedrijf, de podcast, onze nieuwsbrief en onze cursussen op www.melrobbins.com.", "note": null, "title": "The Let Them Theory", "author": "Mel Robbins", "url": null, "created_at": "2026-05-03T20:31:26Z", "color": null}, {"id": "kobo-annot-7ef5c83010aeff4a", "source": "kobo", "text": "Jezelf dwingen actie te ondernemen terwijl je vol angsten of twijfels zit of allerlei uitvluchten bedenkt, is een vaardigheid die je kunt leren. Heb je die eenmaal onder de knie, dan begrijp je dat je alles kunt bereiken met kleine, consequente stappen voorwaarts.", "note": null, "title": "The Let Them Theory", "author": "Mel Robbins", "url": null, "created_at": "2026-05-03T20:25:39Z", "color": null}, {"id": "kobo-annot-59502a75fc76e427", "source": "kobo", "text": "Het probleem met wachten is dat er niemand langskomt. Je hebt alleen toestemming nodig van jezelf.", "note": null, "title": "The Let Them Theory", "author": "Mel Robbins", "url": null, "created_at": "2026-05-03T20:23:57Z", "color": null}, {"id": "kobo-annot-3428788eb6cc7ff6", "source": "kobo", "text": "kleine, consequente stappen veranderen alles.", "note": null, "title": "The Let Them Theory", "author": "Mel Robbins", "url": null, "created_at": "2026-05-03T20:22:48Z", "color": null}, {"id": "kobo-annot-5a0ba69a1557186e", "source": "kobo", "text": "De 5-seconderegel leerde me dat actie cruciaal is. Je lost je problemen niet op door erover na te denken. Als je afwacht tot je zin hebt om iets te doen, zul je nooit in actie komen. Ik leerde dat niemand je komt redden. Je moet jezelf redden van jezelf. Je moet jezelf dwingen dag na dag kleine stappen te zetten, vooral als je daar geen zin in hebt.", "note": null, "title": "The Let Them Theory", "author": "Mel Robbins", "url": null, "created_at": "2026-05-03T20:17:23Z", "color": null}, {"id": "kobo-annot-536cfba98dda0402", "source": "kobo", "text": "Net zoals het niet veilig is voedsel op de grond te laten liggen, is het ook niet veilig een gedachte in je hoofd te laten rondhangen. Maar als je binnen vijf seconden in actie komt, heb je geen tijd voor twijfel. Geen tijd voor uitstelgedrag. Geen tijd voor uitvluchten. 5-4-3-2-1: actie.", "note": null, "title": "The Let Them Theory", "author": "Mel Robbins", "url": null, "created_at": "2026-05-03T20:15:33Z", "color": null}, {"id": "kobo-annot-07bc9d976336af24", "source": "kobo", "text": "Ik begon het de ‘5-seconderegel’ te noemen omdat ik besefte dat mijn brein die tijd nodig had om een idee te verpesten.", "note": null, "title": "The Let Them Theory", "author": "Mel Robbins", "url": null, "created_at": "2026-05-03T20:14:48Z", "color": null}, {"id": "kobo-annot-a0d57b225d3cd6d5", "source": "kobo", "text": "Tel gewoon af van 5 tot 1 en sta dan op.", "note": null, "title": "The Let Them Theory", "author": "Mel Robbins", "url": null, "created_at": "2026-05-03T20:13:54Z", "color": null}, {"id": "insta-26924655", "source": "instapaper", "text": "Ik bedoel de term duurzaam in de oorspronkelijke betekenis, zoals door de Verenigde Naties beschreven: ontwikkeling die voorziet in de behoeften van de huidige generatie zonder de mogelijkheden van toekomstige generaties om in hun behoeften te voorzien in gevaar te brengen. Vertaald in drie kernideeën betekent dit: er zijn grenzen aan onze grondstoffen; rechtvaardigheid tussen generaties en tussen landen en samenhang tussen economie en milieu", "note": null, "title": "‘Landbouw is cultuur en ons erfgoed’ - Nieuwe Oogst", "author": null, "url": "https://www.nieuweoogst.nl/nieuws/2026/04/27/landbouw-is-cultuur-en-ons-erfgoed", "created_at": "2026-05-01T11:41:14", "color": null}, {"id": "insta-26924608", "source": "instapaper", "text": "We besteden steeds minder tijd aan het lezen van boeken. De Britse schrijver James Marriott stelde in een zwaar aangezet hit-essay zelfs dat er een post-geletterde samenleving ontstaat", "note": null, "title": "Dit vind ik één van de mooiste Europese uitvindingen", "author": null, "url": "https://substack.pfauth.com/p/dit-vind-ik-een-van-de-mooiste-europese", "created_at": "2026-05-01T11:30:30", "color": null}, {"id": "insta-26924603", "source": "instapaper", "text": "werkzame leven véél efficiënter aan het inrichten ben met AI agents - dit mooie citaat van Milan Kundera:\n\n“Je kunt de mens terecht verwijten dat hij in zijn leven van alledag blind is voor dergelijke toevalligheden, waardoor zijn leven de dimensie van schoonheid verliest", "note": null, "title": "Dit vind ik één van de mooiste Europese uitvindingen", "author": null, "url": "https://substack.pfauth.com/p/dit-vind-ik-een-van-de-mooiste-europese", "created_at": "2026-05-01T11:29:41", "color": null}, {"id": "kobo-annot-5f86507bfb764c0f", "source": "kobo", "text": "www.binformedia.nl/wetenschap-en-technologie/nieuwe-technologie-laat-mensen-communiceren-met-dieren", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-05-01T06:38:10Z", "color": null}, {"id": "kobo-annot-cbe34b2003660c6d", "source": "kobo", "text": ". Of wij nou wel of niet bestaan, het maakt niets uit voor het ecosysteem. Als een vlinder, of een bij, of een tijger wordt uitgeroeid en dus uit het ecosysteem verdwijnt, dan heeft dat een impact op de directe omgeving in het ecosysteem waar dat dier leeft. Omdat het een voedselketen onderbreekt bijvoorbeeld. Maar dat geldt niet voor ons als mens: wij hebben als enige op aarde geen functie in het ecosysteem. Wij maken alleen dingen kapot. Misschien dat we, omdat we geen rol spelen in het ecosysteem, onszelf wel boven alle anderen dieren hebben gezet om te laten zien dat we toch belangrijk zijn en een functie hebben. Wie weet.’", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-05-01T06:34:06Z", "color": null}, {"id": "kobo-annot-0beb7500c99926be", "source": "kobo", "text": "elkaar tot slaaf maakten; daarover werden ook geen vragen gesteld. Hoe was het mogelijk dat de ene mens dit de andere mens kon aandoen? Gewoon, wederom omdat het kon. De een was sterker dan de ander en daar maakte je gebruik van.", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-05-01T06:31:49Z", "color": null}, {"id": "kobo-annot-ea9c2bd3678670f2", "source": "kobo", "text": ". Die is gebaseerd op een filosofie: als vrouwen of minderheden niet vrij zijn, dan is niemand vrij.", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-27T21:41:07Z", "color": null}, {"id": "kobo-annot-2813b3ee63f56715", "source": "kobo", "text": "Nog iets om niet te vergeten: pak altijd één set kleding voor je bestemming in je handbagage. Zodat je dus, behalve de kleding die je in het vliegtuig aanhebt, altijd iets bij je hebt waar je op je bestemming echt wat aan hebt.", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-27T20:44:58Z", "color": null}, {"id": "kobo-annot-f6fc0cf6934b72d0", "source": "kobo", "text": "Degenen die het berglandschap in gingen, ontdekten een nieuwe dimensie, die de geologische vraagstukken oversteeg. Het was het gevoel ‘van fysieke vreugde en verrukking’, als gevolg van risico’s nemen. ‘Genietbare angst’ noemt Macfarlane dat. Op de grens van het gevaar probeerde de mens zich te meten met de natuur.", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-27T20:16:05Z", "color": null}, {"id": "kobo-annot-3381be5184478e15", "source": "kobo", "text": "Die vraag waarom mensen naar de top willen, hield ook de befaamde Engelse natuur- en landschapsschrijver Robert Macfarlane bezig. Deze professor aan het Emmanuel College in Cambridge schreef er een boek over: Mountains of the Mind, dat in het Nederlands verscheen als Hoogtekoorts, het raadselachtige verlangen naar de hoogste top. In zijn boek probeert hij ons niet-bergbeklimmers iets te laten begrijpen van de reden dat mensen zo graag omhoog willen.", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-27T20:12:03Z", "color": null}, {"id": "kobo-annot-4ad6f9ead6830546", "source": "kobo", "text": "Eric Arnold, een Nederlandse bergbeklimmer die me inzicht gaf in de beweegredenen van iemand die voor zijn passie de gevaren niet uit de weg ging.", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-27T20:11:10Z", "color": null}, {"id": "kobo-annot-75c2c07a68deea75", "source": "kobo", "text": "Het is geen doodsverlangen, maar wel een soort levensdrift. Voor mij ligt dat in de bergen. En blijkbaar iets dichter naar de rand van het leven toe, wordt voor mij het leven ook steeds mooier.", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-27T20:08:16Z", "color": null}, {"id": "kobo-annot-e8ed41417b2db3a9", "source": "kobo", "text": "legendarische zenmeester Kobo Daishi,", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-26T20:57:53Z", "color": null}, {"id": "kobo-annot-ad1e981c5fe9b19f", "source": "kobo", "text": "Ik kan me vergissen, maar ik denk dat er maar weinig mensen zijn die het gegeven van ‘altijd samen’ wel eens tegen het licht houden en zich serieus afvragen of ze niet eens alleen op pad zouden moeten gaan.", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-26T20:53:34Z", "color": null}, {"id": "kobo-annot-51e384ddf38eb689", "source": "kobo", "text": "Het geheim is natuurlijk dat je van dingen afscheid moet durven nemen, omdat er anders niets nieuws gebeurt. Dat deden al die mensen aan het einde van de wereld die ik sprak voor mijn programma ook. Die durfden dingen af te sluiten om vervolgens aan een nieuw hoofdstuk te beginnen. Die simpele wetenschap is eigenlijk de sleutel naar verandering.", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-26T20:44:52Z", "color": null}, {"id": "kobo-annot-f10b50e5216242ae", "source": "kobo", "text": "Die pijn werd veroorzaakt doordat mensen niet langer energie kregen van hun werk of er zelfs stress van kregen. Het kon ook dat ze niet langer voldoening haalden uit het leven dat ze leidden door de plek waar ze woonden of uit de relatie die ze hadden.", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-26T20:38:26Z", "color": null}, {"id": "kobo-annot-646ff1dac0f99d48", "source": "kobo", "text": "Het tweede element dat er vervolgens bij kwam, was een soort sluimerende pijn. Meestal was die niet scherp of heftig, maar meer een soort steentje in je schoen waar je prima mee kon blijven rondlopen,", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-26T20:38:01Z", "color": null}, {"id": "kobo-annot-9d9b4c3e6069baab", "source": "kobo", "text": ", om te achterhalen hoe ze dat mentaal hebben aangepakt. Zo kwam ik erachter dat het bij de meeste mensen vaak begon met een sluimerend verlangen dat ze al jaren voelden.", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-26T20:37:22Z", "color": null}, {"id": "insta-26898079", "source": "instapaper", "text": "You wake up in a 3rd world jail cell. You’re only allowed to call one person you know to get you out of there. Who do you call", "note": null, "title": "High Agency in 30 Minutes - George Mack", "author": null, "url": "https://www.highagency.com", "created_at": "2026-04-25T10:53:45", "color": null}, {"id": "insta-26898078", "source": "instapaper", "text": "High agency is one of those “I know it when I see it” ideas. And once you see it – you can’t unsee it. Before I explain it, let’s see it", "note": null, "title": "High Agency in 30 Minutes - George Mack", "author": null, "url": "https://www.highagency.com", "created_at": "2026-04-25T10:53:34", "color": null}, {"id": "kobo-annot-3669b9af7a650c43", "source": "kobo", "text": ": zo lang als ik me kan herinneren heb ik een zwak voor afgelegen eilanden.", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-23T21:02:33Z", "color": null}, {"id": "kobo-annot-5bdf77e7ce9cb67a", "source": "kobo", "text": "de Kerguelen,", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-23T21:01:35Z", "color": null}, {"id": "kobo-annot-d2e93f29330de561", "source": "kobo", "text": "Hij keek me glimlachend aan. ‘Dan heb je de juiste keuzes gemaakt. Je hebt het beest in de ogen gekeken, hem erkend en vervolgens de rug toegekeerd. Uit het boekje.’", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-23T21:00:09Z", "color": null}, {"id": "kobo-annot-78ba2c26922a184f", "source": "kobo", "text": "Als je in een moeilijke situatie terechtkomt, beeld je dan in dat je in een snelstromende rivier valt,’ vertelde een van de instructeurs die me voor vertrek een ontvoeringstraining gaf. ‘Probeer niet tegen de rivier in te zwemmen, maar ga op je rug liggen en probeer stroomafwaarts mee te drijven. Dat betekent niet dat je weerloos bent, maar je moet ervoor zorgen dat je je geest rustig houdt en geen plaats maakt voor angst. Die angst beneemt je niet alleen het zicht op een goede oplossing, maar heeft ook geen nut. Angst is gezond om scherp te blijven en eventueel te kunnen ontsnappen aan gevaar, maar in een situatie als deze help je jezelf alleen maar door een oase van rust in je hoofd te creëren. Hoe moeilijk dat ook lijkt. Daar is angst niet tegen bestand: rust en acceptatie van de situatie.’", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-23T20:55:42Z", "color": null}, {"id": "kobo-annot-a4612a67ea5c68f9", "source": "kobo", "text": "Psycholoog Joseph Mikels zegt op maxvandaag.nl1 dat je voor complexe besluiten die snel gemaakt moeten worden beter kunt afgaan op je gevoel en voor simpelere dingen beter je ratio kunt gebruiken. Het onderbewustzijn kan heel veel complexe factoren tegelijk aan, iets wat het rationele denkvermogen een stuk minder goed kan.", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-22T20:51:27Z", "color": null}, {"id": "kobo-annot-9ed820440e0a461d", "source": "kobo", "text": "via nederlandwereldwijd.nl. Die kunnen je in heel veel gevallen goed helpen met allerhande vragen en adviezen.", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-21T20:35:21Z", "color": null}, {"id": "kobo-annot-e6fed8c262ec40f8", "source": "kobo", "text": "Koop die spullen, leg ze ergens in je voorraadkast en ga gewoon door met je leven. Geniet van een lekkere maaltijd, maak een lange wandeling door de natuur, drink met je vrienden een fles wijn en maak plannen voor later. Leef je leven en stap regelmatig uit je comfortzone. Blijf zo nieuwsgierig mogelijk en leer je hele leven nieuwe dingen. En met een beetje voorbereiding, en een dosis (aangeleerde) zelfredzaamheid, kun je dat leven aardig lang volhouden als het plotseling toch anders loopt.", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-19T20:01:44Z", "color": null}, {"id": "kobo-annot-438e6f0bc1d212dc", "source": "kobo", "text": "Zolang ik me kan herinneren heb ik al een zwak voor eilanden. Als kind kon ik eindeloos over de wereldkaart gebogen zitten en alle kleine stipjes bestuderen.", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-19T20:01:35Z", "color": null}, {"id": "kobo-annot-bb8c46f7ccf935f4", "source": "kobo", "text": ". Het zou heel mooi zijn als het onderwijspakket uitgebreid wordt met leerstof waar je als mens later wat aan hebt in de praktijk. Echt goede kennis over de productie van ons voedsel bijvoorbeeld, met praktijklessen in de buitenlucht. Daar heb je later zó veel aan. En kennis die betrekking heeft op zelfredzaamheid: een goede EHBO-cursus bijvoorbeeld, of een cursus zelfverdediging. We kunnen kinderen leren hoe ze zaken zelf kunnen repareren, of hoe ze aan de wolken kunnen zien wat voor weer het wordt. Of, nog verder door fantaserend, lessen in mindfulness om beter bestand te zijn tegen de onverwachte afslagen die het leven soms neemt.", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-17T21:11:11Z", "color": null}, {"id": "kobo-annot-9982ad8c035603c8", "source": "kobo", "text": "En heel belangrijk voor mij: het was een school waar enorm veel verhalen werden verteld. Over de aarde, de sterren, de mens en onze geschiedenis. Over verre volkeren en onbekende landen, maar ook sprookjes, mythen en sagen. Alles om de fantasie van het kind te ontwikkelen en de leerstof op een beeldende manier aan te bieden.", "note": null, "title": "Heimwee moet je koesteren", "author": "Floortje Dessing", "url": null, "created_at": "2026-04-13T20:31:42Z", "color": null}, {"id": "kobo-annot-0674c463694206d3", "source": "kobo", "text": "Any man who asks for greater authority does not deserve to have it.", "note": null, "title": "Dune: Legends, Heroes, Schools: (The Butlerian Jihad, The Machine Crusade, The Battle of Corrin, Paul of Dune, The Winds of Dune, Sisterhood of Dune, Mentats of Dune, Navigators of Dune)", "author": "Brian Herbert", "url": null, "created_at": "2026-04-05T20:59:57Z", "color": null}, {"id": "kobo-annot-331d2e0811da34ee", "source": "kobo", "text": "It seems like _________ is valuable to you. It seems like you don’t like _________. It seems like you value __________. It seems like _________ makes it easier. It seems like you’re reluctant to _________.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-20T22:18:08Z", "color": null}, {"id": "kobo-annot-58d21ef04428bf39", "source": "kobo", "text": "I tell my clients that as part of their preparation they should think about the outcome extremes: best and worst. If you’ve got both ends covered, you’ll be ready for anything. So know what you cannot accept and have an idea about the best-case outcome,", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-19T21:28:28Z", "color": null}, {"id": "kobo-annot-ca7c4073a132828e", "source": "kobo", "text": "Remember, never be so sure of what you want that you wouldn’t take something better. Once you’ve got flexibility in the forefront of your mind you come into a negotiation with a winning mindset.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-19T21:28:02Z", "color": null}, {"id": "kobo-annot-b7161b7cfb0018a9", "source": "kobo", "text": "God knows aiming low is seductive. Self-esteem is a huge factor in negotiation, and many people set modest goals to protect it. It’s easier to claim victory when you aim low.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-19T21:26:12Z", "color": null}, {"id": "kobo-annot-7a568760be1f4c10", "source": "kobo", "text": "When the pressure is on, you don’t rise to the occasion—you fall to your highest level of preparation.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-19T21:19:31Z", "color": null}, {"id": "kobo-annot-c0c00dfd781ab691", "source": "kobo", "text": "■Let what you know—your known knowns—guide you but not blind you. Every case is new, so remain flexible and adaptable. Remember the Griffin bank crisis: no hostage-taker had killed a hostage on deadline, until he did.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-17T21:58:45Z", "color": null}, {"id": "kobo-annot-9b192d8a74828bc8", "source": "kobo", "text": "When you ask calibrated questions, yes, you are leading your counterpart to your goals. But you are also leading them to examine and articulate what they want and why and how they can achieve it. You are demanding creativity of them, and therefore pushing them toward a collaborative solution.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-17T21:55:50Z", "color": null}, {"id": "kobo-annot-41b382f8c5d94274", "source": "kobo", "text": "You’re going to have to embrace regular, thoughtful conflict as the basis of effective negotiation—and of life. Please remember that our emphasis throughout the book is that the adversary is the situation and that the person that you appear to be in conflict with is actually your partner.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-17T21:54:05Z", "color": null}, {"id": "kobo-annot-a4623da59316df2e", "source": "kobo", "text": "While you have to get face time, formal business meetings, structured encounters, and planned negotiating sessions are often the least revealing kinds of face time because these are the moments when people are at their most guarded.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-17T21:40:56Z", "color": null}, {"id": "kobo-annot-1a179e157cd89413", "source": "kobo", "text": ". So we told him to send a version of our classic email for nonresponders, the one that always works: “Have you given up on finalizing this deal this year?”", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-16T21:44:15Z", "color": null}, {"id": "kobo-annot-6c1652b3f309f549", "source": "kobo", "text": "The clear point here is that people operating with incomplete information appear crazy to those who have different information. Your job when faced with someone like this in a negotiation is to discover what they do not know and supply that information.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-16T21:42:15Z", "color": null}, {"id": "kobo-annot-5665f144f08b5c2d", "source": "kobo", "text": "But the moment when we’re most ready to throw our hands up and declare “They’re crazy!” is often the best moment for discovering Black Swans that transform a negotiation. It is when we hear or see something that doesn’t make sense—something “crazy”—that a crucial fork in the road is presented: push forward, even more forcefully, into that which we initially can’t process; or take the other path, the one to guaranteed failure, in which we tell ourselves that negotiating was useless anyway.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-16T21:39:06Z", "color": null}, {"id": "kobo-annot-6fad981fddd10c7a", "source": "kobo", "text": "Research studies have shown that people respond favorably to requests made in a reasonable tone of voice and followed with a “because” reason.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-16T21:29:22Z", "color": null}, {"id": "kobo-annot-27cc1dbe41d443de", "source": "kobo", "text": "But when someone displays a passion for what we’ve always wanted and conveys a purposeful plan of how to get there, we allow our perceptions of what’s possible to change. We’re all hungry for a map to joy, and when someone is courageous enough to draw it for us, we naturally follow.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-16T21:27:38Z", "color": null}, {"id": "kobo-annot-14b6d6ec864468f9", "source": "kobo", "text": "People trust those who are in their in-group. Belonging is a primal instinct. And if you can trigger that instinct, that sense that, “Oh, we see the world the same way,” then you immediately gain influence.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-16T21:22:29Z", "color": null}, {"id": "kobo-annot-147fbb2a3b6a62ac", "source": "kobo", "text": "By positioning your demands within the worldview your counterpart uses to make decisions, you show them respect and that gets you attention and results.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-16T21:14:35Z", "color": null}, {"id": "kobo-annot-4c8bc7b5bdf381c1", "source": "kobo", "text": "But we couldn’t hit on that at all; we couldn’t threaten to kill him and expect that to work. The reason for that is something called the “paradox of power”—namely, the harder we push the more likely we are to be met with resistance. That’s why you have to use negative leverage sparingly.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-15T21:48:24Z", "color": null}, {"id": "kobo-annot-8c0f712c4be46d76", "source": "kobo", "text": "Discovering the Black Swans that give you normative valuation can be as easy as asking what your counterpart believes and listening openly. You want to see what language they speak, and speak it back to them.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-15T21:37:54Z", "color": null}, {"id": "kobo-annot-8328553e555863ad", "source": "kobo", "text": "Every person has a set of rules and a moral framework. Normative leverage is using the other party’s norms and standards to advance your position. If you can show inconsistencies between their beliefs and their actions, you have normative leverage. No one likes to look like a hypocrite.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-15T21:36:52Z", "color": null}, {"id": "kobo-annot-9407d49a080a896d", "source": "kobo", "text": "That said, a word of warning: I do not believe in making direct threats and am extremely careful with even subtle ones. Threats can be like nuclear bombs. There will be a toxic residue that will be difficult to clean up. You have to handle the potential of negative consequences with care, or you will hurt yourself and poison or blow up the whole process.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-15T21:35:31Z", "color": null}, {"id": "kobo-annot-d4d0303ffc389402", "source": "kobo", "text": "Negative leverage is what most civilians picture when they hear the word “leverage.” It’s a negotiator’s ability to make his counterpart suffer. And it is based on threats: you have negative leverage if you can tell your counterpart, “If you don’t fulfill your commitment/pay your bill/etc., I will destroy your reputation.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-15T21:32:34Z", "color": null}, {"id": "kobo-annot-d7ee46a2f7639907", "source": "kobo", "text": "Positive leverage is quite simply your ability as a negotiator to provide—or withhold—things that your counterpart wants. Whenever the other side says, “I want . . .” as in, “I want to buy your car,” you have positive leverage.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-14T22:10:35Z", "color": null}, {"id": "kobo-annot-ac3fd50fc38f48ad", "source": "kobo", "text": "One way to understand leverage is as a fluid that sloshes between the parties. As a negotiator you should always be aware of which side, at any given moment, feels they have the most to lose if negotiations collapse. The party who feels they have more to lose and are the most afraid of that loss has less leverage, and vice versa. To get leverage, you have to persuade your counterpart that they have something real to lose if the deal falls through.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-14T22:10:08Z", "color": null}, {"id": "kobo-annot-ea5f24cacdd45dc2", "source": "kobo", "text": "In practice, where our irrational perceptions are our reality, loss and gain are slippery notions, and it often doesn’t matter what leverage actually exists against you; what really matters is the leverage they think you have on them. That’s why I say there’s always leverage: as an essentially emotional concept, it can be manufactured whether it exists or not.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-14T22:07:23Z", "color": null}, {"id": "kobo-annot-9bc8c97869b34984", "source": "kobo", "text": "The answer is leverage. Black Swans are leverage multipliers. They give you the upper hand.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-14T22:05:10Z", "color": null}, {"id": "kobo-annot-7048bb52e0a4089c", "source": "kobo", "text": "Don’t look to verify what you expect. If you do, that’s what you’ll find. Instead, you must open yourself up to the factual reality that is in front of you.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-14T22:02:44Z", "color": null}, {"id": "kobo-annot-a246ae3ee6b7f77d", "source": "kobo", "text": "That’s why I say that finding and understanding Black Swans requires a change of mindset. You have to open up your established pathways and embrace more intuitive and nuanced ways of listening.", "note": "Net als eragon bij zijn traning", "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-14T21:59:30Z", "color": null}, {"id": "kobo-annot-9771aeb9fffe0455", "source": "kobo", "text": "But those were not the only important lessons of that tragic event. If an overreliance on known knowns can shackle a negotiator to assumptions that prevent him from seeing and hearing all that a situation presents, then perhaps an enhanced receptivity to the unknown unknowns can free that same negotiator to see and hear the things that can produce dramatic breakthroughs.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-14T21:56:47Z", "color": null}, {"id": "kobo-annot-70a250c31b02fc0a", "source": "kobo", "text": "The lesson of what happened at 3 p.m. on June 17, 1981, in Rochester, New York, was that when bits and pieces of a case don’t add up it’s usually because our frames of reference are off; they will never add up unless we break free of our expectations.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-11T21:40:27Z", "color": null}, {"id": "kobo-annot-7b2c65bc33b9fd35", "source": "kobo", "text": "As Taleb uses the term, the Black Swan symbolizes the uselessness of predictions based on previous experience. Black Swans are events or pieces of knowledge that sit outside our regular expectations and therefore cannot be predicted.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-11T16:02:49Z", "color": null}, {"id": "kobo-annot-419e3802203ec097", "source": "kobo", "text": "Prepare, prepare, prepare. When the pressure is on, you don’t rise to the occasion; you fall to your highest level of preparation. So design an ambitious but legitimate goal and then game out the labels, calibrated questions, and responses you’ll use to get there. That way, once you’re at the bargaining table, you won’t have to wing it.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-11T06:54:58Z", "color": null}, {"id": "kobo-annot-97f252750dba9500", "source": "kobo", "text": "Ka-ching! Notice this brilliant combination of decreasing Ackerman offers, nonround numbers, deep research, smart labeling, and saying no without saying “No”? That’s what gets you a rent discount when a landlord wanted to raise his monthly take.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-11T06:53:42Z", "color": null}, {"id": "kobo-annot-43509a47149d25ee", "source": "kobo", "text": "5.When calculating the final amount, use precise, nonround numbers like, say, $37,893 rather than $38,000. It gives the number credibility and weight. 6.On your final number, throw in a nonmonetary item (that they probably don’t want) to show you’re at your limit.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-10T21:41:39Z", "color": null}, {"id": "kobo-annot-c8ac395a75667de2", "source": "kobo", "text": "The Ackerman model is an offer-counteroffer method, at least on the surface. But it is a very effective system for beating the usual lackluster bargaining dynamic, which has the predictable result of meeting in the middle. The systematized and easy-to-remember process has only four steps: 1.Set your target price (your goal). 2.Set your first offer at 65 percent of your target price. 3.Calculate three raises of decreasing increments (to 85, 95, and 100 percent). 4.Use lots of empathy and different ways of saying “No” to get the other side to counter before you increase your offer.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-10T21:41:17Z", "color": null}, {"id": "kobo-annot-172be53044dfb9bb", "source": "kobo", "text": "In any bare-knuckle bargaining session, the most vital principle to keep in mind is never to look at your counterpart as an enemy. The person across the table is never the problem. The unsolved issue is. So focus on the issue. This is one of the most basic tactics for avoiding emotional escalations. Our culture demonizes people in movies and politics, which creates the mentality that if we only got rid of the person then everything would be okay. But this dynamic is toxic to any negotiation.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-10T21:36:09Z", "color": null}, {"id": "kobo-annot-183758a06a757e6a", "source": "kobo", "text": "We’ve said previously that no deal is better than a bad deal. If you feel you can’t say “No” then you’ve taken yourself hostage.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-10T21:33:55Z", "color": null}, {"id": "kobo-annot-40b57a29c1e42fba", "source": "kobo", "text": "The traditional “I” message is to use “I” to hit the pause button and step out of a bad dynamic. When you want to counteract unproductive statements from your counterpart, you can say, “I feel ___ when you ___ because ___,” and that demands a time-out from the other person.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-10T21:33:09Z", "color": null}, {"id": "kobo-annot-811984f8f1ff5397", "source": "kobo", "text": "Using the first-person singular pronoun is another great way to set a boundary without escalating into confrontation. When you say, “I’m sorry, that doesn’t work for me,” the word “I” strategically focuses your counterpart’s attention onto you long enough for you to make a point.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-10T21:32:10Z", "color": null}, {"id": "kobo-annot-c24906d603a38c7b", "source": "kobo", "text": "client away from a competitor, you might say, “Why would you ever do business with me? Why would you ever change from your existing supplier? They’re great!” In these questions, the “Why?” coaxes your counterpart into working for you.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-10T21:31:29Z", "color": null}, {"id": "kobo-annot-ee41a85b79d5191d", "source": "kobo", "text": "The real lesson here is being aware of how this might be used on you. Please don’t allow yourself to fall victim to “strategic umbrage.”", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-10T21:27:10Z", "color": null}, {"id": "kobo-annot-7c3bcf1fb217a913", "source": "kobo", "text": "And so when someone puts out a ridiculous offer, one that really pisses you off, take a deep breath, allow little anger, and channel it—at the proposal, not the person—and say, “I don’t see how that would ever work.”", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-10T21:26:16Z", "color": null}, {"id": "kobo-annot-62b82834fc656625", "source": "kobo", "text": "And if the other side pushes you to go first, wriggle from his grip. Instead of naming a price, allude to an incredibly high number that someone else might charge. Once when a hospital chain wanted me to name a price first, I said, “Well, if you go to Harvard Business School, they’re going to charge you $2,500 a day per student.” No matter what happens, the point here is to sponge up information from your counterpart. Letting your counterpart anchor first will give you a tremendous feel for him. All you need to learn is how to take the first punch.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-09T22:05:57Z", "color": null}, {"id": "kobo-annot-677fa797a1ce5a69", "source": "kobo", "text": "First, deflect the punch in a way that opens up your counterpart. Successful negotiators often say “No” in one of the many ways we’ve talked about (“How am I supposed to accept that?”) or deflect the anchor with questions like “What are we trying to accomplish here?” Responses like these are great ways to refocus your counterpart when you feel you’re being pulled into the compromise trap.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-09T22:05:24Z", "color": null}, {"id": "kobo-annot-735aead6ed86dd1d", "source": "kobo", "text": "You can do this directly by saying, in an encouraging tone of voice, “Let’s put price off to the side for a moment and talk about what would make this a good deal.” Or you could go at it more obliquely by asking, “What else would you be able to offer to make that a good price for me?”", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-09T22:05:17Z", "color": null}, {"id": "kobo-annot-69e85e43fd39a6a6", "source": "kobo", "text": "The greatest obstacle to accurately identifying someone else’s style is what I call the “I am normal” paradox. That is, our hypothesis that the world should look to others as it looks to us. After all, who wouldn’t make that assumption?", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-09T21:55:16Z", "color": null}, {"id": "kobo-annot-d02446eee3f02afe", "source": "kobo", "text": "Some people are Accommodators; others—like me—are basically Assertive; and the rest are data-loving Analysts.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-08T21:45:35Z", "color": null}, {"id": "kobo-annot-0e58a964fa05f04d", "source": "kobo", "text": "Here it is: the clash for cash, an uneasy dance of offers and counters that send most people into a cold sweat. If you count yourself among that majority, regarding the inevitable moment as nothing more than a necessary evil, there’s a good chance you regularly get your clock cleaned by those who have learned to embrace it.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-07T22:09:35Z", "color": null}, {"id": "kobo-annot-c4152ed1144fcadd", "source": "kobo", "text": "to the other side and even get your own personal discount. Humor and humanity are the best ways to break the ice and remove roadblocks.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-07T07:18:04Z", "color": null}, {"id": "kobo-annot-72f744a18b00d8dc", "source": "kobo", "text": "Don’t just pay attention to the people you’re negotiating with directly; always identify the motivations of the players “behind the table.” You can do so by asking how a deal will affect everybody else and how on board they are.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-07T07:16:27Z", "color": null}, {"id": "kobo-annot-b7be7528d8d27aa7", "source": "kobo", "text": "That is, “Yes” is nothing without “How.” Asking “How,” knowing “How,” and defining “How” are all part of the effective negotiator’s arsenal. He would be unarmed without them.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-07T07:15:23Z", "color": null}, {"id": "kobo-annot-89f637baf5565c47", "source": "kobo", "text": "Superstar negotiators—real rainmakers—know that a negotiation is a playing field beneath the words, where really getting to a good deal involves detecting and manipulating subtle, nonobvious signals beneath the surface.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-07T07:14:58Z", "color": null}, {"id": "kobo-annot-54a31187c737db5e", "source": "kobo", "text": "Then you can use something like “I’m sorry but I’m afraid I just can’t do that.” It’s a little more direct, and the “can’t do that” does great double duty. By expressing an inability to perform, it can trigger the other side’s empathy toward you. “I’m sorry, no” is a slightly more succinct version for the fourth “No.” If delivered gently, it barely sounds negative at all. If you have to go further, of course, “No” is the last and most direct way. Verbally, it should be delivered with a downward inflection and a tone of regard; it’s not meant to be “NO!”", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-06T21:51:07Z", "color": null}, {"id": "kobo-annot-9bcdf78c7c566740", "source": "kobo", "text": "You can ignore the so-called negotiating experts who say apologies are always signs of weakness.)", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-06T21:50:44Z", "color": null}, {"id": "kobo-annot-5d18ca647413adeb", "source": "kobo", "text": "After that, some version of “Your offer is very generous, I’m sorry, that just doesn’t work for me” is an elegant second way to say “No.”", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-06T21:48:36Z", "color": null}, {"id": "kobo-annot-92ea70e1706cb40c", "source": "kobo", "text": "We’ve found that you can usually express “No” four times before actually saying the word. The first step in the “No” series is the old standby: “How am I supposed to do that?” You have to deliver it in a deferential way, so it becomes a request for help. Properly delivered, it invites the other side to participate in your dilemma and solve it with a better offer.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-06T21:48:22Z", "color": null}, {"id": "kobo-annot-1b2149919cefd325", "source": "kobo", "text": "I asked her if I got a discount for joining and she said, “No.” So I decided to try another angle. I said in a friendly manner, “My name is Chris. What’s the Chris discount?” She looked from the register, met my eyes, and gave a little laugh.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-06T21:45:20Z", "color": null}, {"id": "kobo-annot-42bb302bc7db6347", "source": "kobo", "text": "The use of pronouns by a counterpart can also help give you a feel for their actual importance in the decision and implementation chains on the other side of the table. The more in love they are with “I,” “me,” and “my” the less important they are. Conversely, the harder it is to get a first person pronoun out of a negotiator’s mouth, the more important they are.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-06T21:37:02Z", "color": null}, {"id": "kobo-annot-8a7c990eb47c1556", "source": "kobo", "text": "Or the three times might just be the same calibrated question phrased three different ways, like “What’s the biggest challenge you faced? What are we up against here? What do you see as being the most difficult thing to get around?” Either way, going at the same issue three times uncovers falsehoods as well as the incongruences between words and body language we mentioned in the last section. So next time you’re not sure your counterpart is truthful and committed, try it.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-06T21:34:38Z", "color": null}, {"id": "kobo-annot-ceb152700761c0de", "source": "kobo", "text": "The first time they agree to something or give you a commitment, that’s No. 1. For No. 2 you might label or summarize what they said so they answer, “That’s right.” And No. 3 could be a calibrated “How” or “What” question about implementation that asks them to explain what will constitute success, something like “What do we do if we get off track?”", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-06T21:33:30Z", "color": null}, {"id": "kobo-annot-8c7416f63f5649f2", "source": "kobo", "text": "The Rule of Three is simply getting the other guy to agree to the same thing three times in the same conversation. It’s tripling the strength of whatever dynamic you’re trying to drill into at the moment. In doing so, it uncovers problems before they happen. It’s really hard to repeatedly lie or fake conviction.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-06T21:32:02Z", "color": null}, {"id": "kobo-annot-c255d95c719ddb2a", "source": "kobo", "text": "This happens because there are actually three kinds of “Yes”: Commitment, Confirmation, and Counterfeit.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-06T21:30:23Z", "color": null}, {"id": "kobo-annot-2dd981465c549c24", "source": "kobo", "text": "When someone’s tone of voice or body language does not align with the meaning of the words they say, use labels to discover the source of the incongruence. Here’s an example: You: “So we’re agreed?” Them: “Yes . . .” You: “I heard you say, ‘Yes,’ but it seemed like there was hesitation in your voice.” Them: “Oh, it’s nothing really.” You: “No, this is important, let’s make sure we get this right.” Them: “Thanks, I appreciate it.”", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-06T21:29:23Z", "color": null}, {"id": "kobo-annot-e24a05a347165e12", "source": "kobo", "text": "So how do you use this rule? First, pay very close attention to tone and body language to make sure they match up with the literal meaning of the words. If they don’t align, it’s quite possible that the speaker is lying or at least unconvinced.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-06T21:27:57Z", "color": null}, {"id": "kobo-annot-e53f1214cbd4d101", "source": "kobo", "text": "In two famous studies on what makes us like or dislike somebody,1 UCLA psychology professor Albert Mehrabian created the 7-38-55 rule. That is, only 7 percent of a message is based on the words while 38 percent comes from the tone of voice and 55 percent from the speaker’s body language and face.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-06T21:26:34Z", "color": null}, {"id": "kobo-annot-123fffc2d0f85f8a", "source": "kobo", "text": "the art of letting someone else have your way.” There are two key questions you can ask to push your counterparts to think they are defining success their way: “How will we know we’re on track?” and “How will we address things if we find we’re off track?” When they answer, you summarize their answers until you get a “That’s right.” Then you’ll know they’ve bought in. On the flip side, be wary of two telling signs that your counterpart doesn’t believe the idea is theirs. As I’ve noted, when they say, “You’re right,” it’s often a good indicator they are not vested in what is being discussed. And when you push for implementation and they say, “I’ll try,” you should get a sinking feeling in your stomach. Because this really means, “I plan to fail.” When you hear either of these, dive back in with calibrated “How” questions until they define the terms of successful implementation in their own voice. Follow up by summarizing what they have said to get a “That’s right.”", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-04T22:21:10Z", "color": null}, {"id": "kobo-annot-b3db81726ebb628f", "source": "kobo", "text": "“forced empathy,”", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-04T22:14:35Z", "color": null}, {"id": "kobo-annot-4f1e9cc30577383f", "source": "kobo", "text": "As Julie did, the first and most common “No” question you’ll use is some version of “How am I supposed to do that?” (for example, “How can we raise that much?”). Your tone of voice is critical as this phrase can be delivered as either an accusation or a request for assistance. So pay attention to your voice.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-04T22:13:39Z", "color": null}, {"id": "kobo-annot-bb07111b085e6f4f", "source": "kobo", "text": "to develop a better solution—your solution. A gentle How/No invites collaboration and leaves your counterpart with a feeling of having been treated with respect.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-04T22:12:47Z", "color": null}, {"id": "kobo-annot-010327a6e7d29b2c", "source": "kobo", "text": "The trick to “How” questions is that, correctly used, they are", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-04T22:11:05Z", "color": null}, {"id": "kobo-annot-128dc68b3d550eca", "source": "kobo", "text": "“Yes” is nothing without “How.”", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-03T21:34:11Z", "color": null}, {"id": "kobo-annot-deb6025295f03c39", "source": "kobo", "text": "■Bite your tongue. When you’re attacked in a negotiation, pause and avoid angry emotional reactions. Instead, ask your counterpart a calibrated question.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-03T21:29:22Z", "color": null}, {"id": "kobo-annot-65da696c67c53f9b", "source": "kobo", "text": "listener’s judo.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-03T21:27:26Z", "color": null}, {"id": "kobo-annot-65bee937d50a7700", "source": "kobo", "text": "The listener, of course. That’s because the talker is revealing information while the listener, if he’s trained well, is directing the conversation toward his own goals. He’s harnessing the talker’s energy for his own ends.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-03T21:26:19Z", "color": null}, {"id": "kobo-annot-c510168d4e23e858", "source": "kobo", "text": "Who has control in a conversation, the guy listening or the guy", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-03T21:25:50Z", "color": null}, {"id": "kobo-annot-9d5bee6f86328daa", "source": "kobo", "text": "In a negotiation, like in the one between my client and the CEO, this always produces a negative outcome. So we have to train our neocortex to override the emotions from the other two brains. That means biting your tongue and learning how to mindfully change your state to something more positive. And it means lowering the hostage mentality in your counterpart by asking a question or even offering an apology. (“You’re right. That was a bit harsh.”)", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-03T21:25:14Z", "color": null}, {"id": "kobo-annot-9810e90cf75ecd08", "source": "kobo", "text": "Another simple rule is, when you are verbally assaulted, do not counterattack. Instead, disarm your counterpart by asking a calibrated question. The next time a waiter or salesclerk tries to engage you in a verbal skirmish, try this out. I promise you it will change the entire tenor of the conversation.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-03T21:23:08Z", "color": null}, {"id": "kobo-annot-f955288c3c23addb", "source": "kobo", "text": "With that in mind, I want to end this chapter with some advice on how to remain rational in a negotiation. Even with all the best techniques and strategy, you need to regulate your emotions if you want to have any hope of coming out on top. The first and most basic rule of keeping your emotional cool is to bite your tongue. Not literally, of course. But you have to keep away from knee-jerk, passionate reactions. Pause. Think. Let the passion dissipate. That allows you to collect your thoughts and be more circumspect in what you say. It also lowers your chance of saying more than you want to.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-03T21:22:25Z", "color": null}, {"id": "kobo-annot-92b47b669bd4782e", "source": "kobo", "text": "You’ve not only implicitly asked for help—triggering goodwill and less defensiveness—but you’ve engineered a situation in which your formerly recalcitrant counterpart is now using his mental and emotional resources to overcome your challenges. It is the first step in your counterpart internalizing your way—and the obstacles in it—as his own. And that guides the other party toward designing a solution. Your solution.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-03T21:07:53Z", "color": null}, {"id": "kobo-annot-52b54fe48f010c70", "source": "kobo", "text": "The implication of any well-designed calibrated question is that you want what the other guy wants but you need his intelligence to overcome the problem. This really appeals to very aggressive or egotistical counterparts.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-03T21:06:15Z", "color": null}, {"id": "kobo-annot-8fc7a82562c6f01b", "source": "kobo", "text": "The real beauty of calibrated questions is the fact that they offer no target for attack like statements do. Calibrated questions have the power to educate your counterpart on what the problem is rather than causing conflict by telling them what the problem is.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-01T21:47:46Z", "color": null}, {"id": "kobo-annot-59d0c3d8af968c7c", "source": "kobo", "text": "My advice for her was simple: I told her to engage them in a conversation where she summarized the situation and then asked, “How am I supposed to do that?”", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-01T21:44:50Z", "color": null}, {"id": "kobo-annot-7baf195f052c046f", "source": "kobo", "text": "technique for transforming encounters from confrontational showdowns into joint problem-solving sessions. And calibrated questions are the best tool.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-01T21:42:31Z", "color": null}, {"id": "kobo-annot-0ad5a7d183d5cc1c", "source": "kobo", "text": "ask for help with one of the greatest-of-all-time calibrated questions: “How am I supposed to do that?” The critical part of this approach is that you really are asking for help and your delivery must convey that. With this negotiating scheme, instead of bullying the clerk, you’re asking for their advice and giving them the illusion of control. Asking for help in this manner, after you’ve already been engaged in a dialogue, is an incredibly powerful negotiating", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-01T21:42:03Z", "color": null}, {"id": "kobo-annot-052a9418e4a059c1", "source": "kobo", "text": "Giving your counterpart the illusion of control by asking calibrated questions—by asking for help—is one of the most powerful tools for suspending unbelief.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-01T21:37:16Z", "color": null}, {"id": "kobo-annot-c72a432cfb0eb4a7", "source": "kobo", "text": "Unbelief is the friction that keeps persuasion in check,” Dutton says. “Without it, there’d be no limits.”", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at":
