 "2026-03-01T21:35:06Z", "color": null}, {"id": "kobo-annot-3273e30db0899585", "source": "kobo", "text": "Our job as persuaders is easier than we think. It’s not to get others believing what we say. It’s just to stop them unbelieving.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-01T21:34:38Z", "color": null}, {"id": "kobo-annot-29e1cc63fb725d36", "source": "kobo", "text": ". But if you can get the other side to drop their unbelief, you can slowly work them to your point of view on the back of their energy, just like the drug dealer’s question got the kidnapper to volunteer to do what the drug dealer wanted. You don’t directly persuade them to see your ideas. Instead, you ride them to your ideas. As the saying goes, the best way to ride a horse is in the direction in which it is going.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-01T21:34:13Z", "color": null}, {"id": "kobo-annot-c7e749e2cd0671b5", "source": "kobo", "text": "The genius of this technique is really well explained by something that the psychologist Kevin Dutton says in his book Split-Second Persuasion.1 He talks about what he calls “unbelief,” which is active resistance to what the other side is saying, complete rejection. That’s where the two parties in a negotiation usually start.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-01T21:29:41Z", "color": null}, {"id": "kobo-annot-954d70727f80c9c1", "source": "kobo", "text": "Whether we like to recognize it or not, a universal rule of human nature, across all cultures, is that when somebody gives you something, they expect something in return. And they won’t give anything else until you pay them back.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-01T21:25:43Z", "color": null}, {"id": "kobo-annot-cb797f914181895d", "source": "kobo", "text": "The tool we developed is something I call the calibrated, or open-ended, question. What it does is remove aggression from conversations by acknowledging the other side openly, without resistance. In doing so, it lets you introduce ideas and requests without sounding pushy. It allows you to nudge.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-01T08:02:20Z", "color": null}, {"id": "kobo-annot-e2f82f229b7510bf", "source": "kobo", "text": "When your counterpart drops the F-bomb, don’t get suckered into a concession. Instead, ask them to explain how you’re mistreating them.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-03-01T07:57:21Z", "color": null}, {"id": "kobo-annot-d22792d67153ed95", "source": "kobo", "text": "By far the best theory for describing the principles of our irrational decisions is something called Prospect Theory. Created in 1979 by the psychologists Daniel Kahneman and Amos Tversky, prospect theory describes how people choose between options that involve risk, like in a negotiation. The theory argues that people are drawn to sure things over probabilities, even when the probability is a better choice. That’s called the Certainty Effect. And people will take greater risks to avoid losses than to achieve gains. That’s called Loss Aversion.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T21:29:45Z", "color": null}, {"id": "kobo-annot-d9abccd54c6cefb6", "source": "kobo", "text": "If you find yourself in this situation, the best reaction is to simply mirror the “F” that has just been lobbed at you. “Fair?” you’d respond, pausing to let the word’s power do to them as it was intended to do to you. Follow that with a label: “It seems like you’re ready to provide the evidence that supports that,” which alludes to opening their books or otherwise handing over information that will either contradict their claim to fairness or give you more data to work with than you had previously. Right away, you declaw the attack.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T21:23:16Z", "color": null}, {"id": "kobo-annot-bcc1f7c6155faf21", "source": "kobo", "text": "The best response either way is to take a deep breath and restrain your desire to concede. Then say, “Okay, I apologize. Let’s stop everything and go back to where I started treating you unfairly and we’ll fix it.”", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T11:52:46Z", "color": null}, {"id": "kobo-annot-bfe81e347f84df4c", "source": "kobo", "text": ". Most people make an irrational choice to let the dollar slip through their fingers rather than to accept a derisory offer, because the negative emotional value of unfairness outweighs the positive rational value of the money.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T11:47:58Z", "color": null}, {"id": "kobo-annot-e2cb3557f0c8a30e", "source": "kobo", "text": "The most powerful word in negotiations is “Fair.” As human beings, we’re mightily swayed by how much we feel we have been respected. People comply with agreements if they feel they’ve been treated fairly and lash out if they don’t.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T11:47:50Z", "color": null}, {"id": "kobo-annot-a5bebbbfec3a01d9", "source": "kobo", "text": "In other words, while we may use logic to reason ourselves toward a decision, the actual decision making is governed by emotion.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T11:42:30Z", "color": null}, {"id": "kobo-annot-e66e5363ae45220a", "source": "kobo", "text": "This rocks my students’ view of themselves as rational actors. But they’re not. None of us are. We’re all irrational, all emotional. Emotion is a necessary element to decision making that we ignore at our own peril. Realizing that hits people hard between the eyes.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T11:41:41Z", "color": null}, {"id": "kobo-annot-5b4517b21f557629", "source": "kobo", "text": "If you approach a negotiation thinking that the other guy thinks like you, you’re wrong,” I say. “That’s not empathy; that’s projection.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T11:40:31Z", "color": null}, {"id": "kobo-annot-8e29fd1a5c5b2b18", "source": "kobo", "text": "Moore discovered that when negotiators tell their counterparts about their deadline, they get better deals. It’s true. First, by revealing your cutoff you reduce the risk of impasse. And second, when an opponent knows your deadline, he’ll get to the real deal- and concession-making more quickly.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T11:35:40Z", "color": null}, {"id": "kobo-annot-b74e001624112abb", "source": "kobo", "text": "Allow me to let you in on a little secret: Cohen, and the herd of negotiation “experts” who follow his lead, are wrong. Deadlines cut both ways. Cohen may well have been nervous about what his boss would say if he left Japan without an agreement. But it’s also true that Cohen’s counterparts wouldn’t have won if he’d left without a deal. That’s the key: When the negotiation is over for one side, it’s over for the other too.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T11:33:13Z", "color": null}, {"id": "kobo-annot-df0c9511efe0de32", "source": "kobo", "text": "It’s not just with hostage negotiations that deadlines can play into your hands. Car dealers are prone to give you the best price near the end of the month, when their transactions are assessed. And corporate salespeople work on a quarterly basis and are most vulnerable as the quarter comes to a close.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T11:30:42Z", "color": null}, {"id": "kobo-annot-8275d298bea7c81b", "source": "kobo", "text": "Increasing specificity on threats in any type of negotiations indicates getting closer to real consequences at a real specified time. To gauge the level of a particular threat, we’d pay attention to how many of the four questions—What? Who? When? And how?—were addressed. When people issue threats, they consciously or subconsciously create ambiguities and loopholes they fully intend to exploit.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T11:29:15Z", "color": null}, {"id": "kobo-annot-0623b22af82b9f2d", "source": "kobo", "text": "No deal is better than a bad deal.”", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T11:26:36Z", "color": null}, {"id": "kobo-annot-51f8f06a46ec3a23", "source": "kobo", "text": "What is it about a deadline that causes pressure and anxiety? The answer is consequences; the perception of the loss we’ll incur in the future—“The deal is off!” our mind screams at us in some imaginary future scenario—should no resolution be achieved by a certain point in time.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T11:24:16Z", "color": null}, {"id": "kobo-annot-3c17f8bde25cd7f0", "source": "kobo", "text": "I’m here to call bullshit on compromise right now. We don’t compromise because it’s right; we compromise because it is easy and because it saves face. We compromise in order to say that at least we got half the pie. Distilled to its essence, we compromise to be safe. Most people in a negotiation are driven by fear or by the desire to avoid pain. Too few are driven by their actual goals.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T11:21:49Z", "color": null}, {"id": "kobo-annot-e7162329f187bbfb", "source": "kobo", "text": "The real problem with compromise is that it has come to be known as this great concept, in relationships and politics and everything else. Compromise, we are told quite simply, is a sacred moral good.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T11:20:50Z", "color": null}, {"id": "kobo-annot-104d3e4d01125b6e", "source": "kobo", "text": "To make my point on compromise, let me paint you an example: A woman wants her husband to wear black shoes with his suit. But her husband doesn’t want to; he prefers brown shoes. So what do they do? They compromise, they meet halfway. And, you guessed it, he wears one black and one brown shoe. Is this the best outcome? No! In fact, that’s the worst possible outcome. Either of the two other outcomes—black or brown—would be better than the compromise. Next time you want to compromise, remind yourself of those mismatched shoes.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T11:19:55Z", "color": null}, {"id": "kobo-annot-c6e1ad19fa0f57b1", "source": "kobo", "text": "But you have to get rid of that naïveté. Because compromise—“splitting the difference”—can lead to terrible outcomes. Compromise is often a “bad deal” and a key theme we’ll hit in this chapter is that “no deal is better than a bad deal.”", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T11:19:08Z", "color": null}, {"id": "kobo-annot-d9629f17eebc586a", "source": "kobo", "text": "Use a summary to trigger a “that’s right.” The building blocks of a good summary are a label combined with paraphrasing. Identify, rearticulate, and emotionally affirm “the world according to . . .”", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T11:12:30Z", "color": null}, {"id": "kobo-annot-08d154695b5b0501", "source": "kobo", "text": "That’s right” is better than “yes.” Strive for it. Reaching “that’s right” in a negotiation creates breakthroughs.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T11:12:20Z", "color": null}, {"id": "kobo-annot-dc52cf6afd5e66b1", "source": "kobo", "text": "Creating unconditional positive regard opens the door to changing thoughts and behaviors. Humans have an innate urge toward socially constructive behavior. The more a person feels understood, and positively affirmed in that understanding, the more likely that urge for constructive behavior will take", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-28T11:11:22Z", "color": null}, {"id": "kobo-annot-375e22e0106ca5ed", "source": "kobo", "text": "“Sleeping in the same bed and dreaming different dreams” is an old Chinese expression that describes the intimacy of partnership (whether in marriage or in business) without the communication necessary to sustain it.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-27T20:43:58Z", "color": null}, {"id": "kobo-annot-7cb5638444238163", "source": "kobo", "text": "Driving toward “that’s right” is a winning strategy in all negotiations. But hearing “you’re right” is a disaster.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-27T20:21:45Z", "color": null}, {"id": "kobo-annot-c58602db613738f4", "source": "kobo", "text": "When your adversaries say, “That’s right,” they feel they have assessed what you’ve said and pronounced it as correct of their own free will. They embrace it.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-27T20:20:09Z", "color": null}, {"id": "kobo-annot-04124ebeab669b73", "source": "kobo", "text": "“That’s right” signaled that negotiations could proceed from deadlock. It broke down a barrier that was impeding progress. It created a realization point with our adversary where he actually agreed on a point without the feeling of having given in.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-27T20:19:39Z", "color": null}, {"id": "kobo-annot-2a31dcb7bec80128", "source": "kobo", "text": "This “negotiation” between Benjie and me was no different than any other negotiation between colleagues who disagree on a strategy. Before you convince them to see what you’re trying to accomplish, you have to say the things to them that will get them to say, “That’s right.” The “that’s right” breakthrough usually doesn’t come at the beginning of a negotiation. It’s invisible to the counterpart when it occurs, and they embrace what you’ve said. To them, it’s a subtle epiphany.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-27T20:12:13Z", "color": null}, {"id": "kobo-annot-03624de7c9766c64", "source": "kobo", "text": "As you’ll soon learn, the sweetest two words in any negotiation are actually “That’s right.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-27T19:01:11Z", "color": null}, {"id": "kobo-annot-3e50c6dc96ef8be1", "source": "kobo", "text": "American psychologist Carl Rogers, who proposed that real change can only come when a therapist accepts the client as he or she is—an approach known as unconditional positive regard. The vast majority of us, however, as Rogers explained, come to expect that love, praise, and approval are dependent on saying and doing the things people (initially, our parents) consider correct. That is, because for most of us the positive regard we experience is conditional, we develop a habit of hiding who we really are and what we really think, instead calibrating our words to gain approval but disclosing little.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-26T21:16:27Z", "color": null}, {"id": "kobo-annot-475ab729e111165f", "source": "kobo", "text": "■Negotiate in their world. Persuasion is not about how bright or smooth or forceful you are. It’s about the other party convincing themselves that the solution you want is their own idea. So don’t beat them with logic or brute force. Ask them questions that open paths to your goals. It’s not about you.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-26T21:12:45Z", "color": null}, {"id": "kobo-annot-b789aeb06a63836a", "source": "kobo", "text": "Triggering “No” peels away the plastic falsehood of “Yes” and gets you to what’s really at stake.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-26T21:10:48Z", "color": null}, {"id": "kobo-annot-2d369ccc97f7bb1a", "source": "kobo", "text": "“No”—or the lack thereof—also serves as a warning, the canary in the coal mine. If despite all your efforts, the other party won’t say “No,” you’re dealing with people who are indecisive or confused or who have a hidden agenda. In cases like that you have to end the negotiation and walk away. Think of it like this: No “No” means no go.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-26T21:05:43Z", "color": null}, {"id": "kobo-annot-87624424837d171b", "source": "kobo", "text": "Today, I coach my students to learn to see “No” for what it is. Rather than harming them or those they negotiate with, “No” protects and benefits all parties in an exchange. “No” creates safety, security, and the feeling of control. It’s a requirement to implementable success. It’s a pause, a nudge, and a chance for the speaker to articulate what they do want.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-26T20:58:30Z", "color": null}, {"id": "kobo-annot-1e1fb3329b8b2372", "source": "kobo", "text": "In fact, “No” often opens the discussion up. The sooner you say “No,” the sooner you’re willing to see options and opportunities that you were blind to previously. Saying “No” often spurs people to action because they feel they’ve protected themselves and now see an opportunity slipping away.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-26T20:56:44Z", "color": null}, {"id": "kobo-annot-578a8c4a1a180db4", "source": "kobo", "text": "Though the intensity may differ from person to person, you can be sure that everyone you meet is driven by two primal urges: the need to feel safe and secure, and the need to feel in control. If you satisfy those drives, you’re in the door.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-26T20:46:58Z", "color": null}, {"id": "kobo-annot-ff04108485cdc5b1", "source": "kobo", "text": "Got it, you say. It’s not about me. We need to persuade from their perspective, not ours. But how? By starting with their most basic wants.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-26T20:45:30Z", "color": null}, {"id": "kobo-annot-0f2905cdb0a5cc2e", "source": "kobo", "text": "It comes down to the deep and universal human need for autonomy. People need to feel in control. When you preserve a person’s autonomy by clearly giving them permission to say “No” to your ideas, the emotions calm, the effectiveness of the decisions go up, and the other party can really look at your proposal.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-26T20:31:13Z", "color": null}, {"id": "kobo-annot-021570c3d384baf6", "source": "kobo", "text": "We have it backward. For good negotiators, “No” is pure gold. That negative provides a great opportunity for you and the other party to clarify what you really want by eliminating what you don’t want. “No” is a safe choice that maintains the status quo; it provides a temporary oasis of control.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-26T16:37:56Z", "color": null}, {"id": "kobo-annot-995634399d9a2c30", "source": "kobo", "text": "Imagine yourself in your counterpart’s situation. The beauty of empathy is that it doesn’t demand that you agree with the other", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-25T22:54:14Z", "color": null}, {"id": "kobo-annot-90d761038489ad4c", "source": "kobo", "text": "They will help you connect and create more meaningful and warm relationships. That they might help you extract what you want is a bonus; human connection is the first goal.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-25T22:51:39Z", "color": null}, {"id": "kobo-annot-4932b4a0d01cd415", "source": "kobo", "text": "And when I make a mistake—something that happens a lot—I always acknowledge the other person’s anger. I’ve found the phrase “Look, I’m an asshole” to be an amazingly effective way to make problems go away. That approach has never failed me.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-25T22:13:32Z", "color": null}, {"id": "kobo-annot-74bc069a1acc1725", "source": "kobo", "text": "First, let’s talk a little human psychology. In basic terms, people’s emotions have two levels: the “presenting” behavior is the part above the surface you can see and hear; beneath, the “underlying” feeling is what motivates the behavior.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-25T22:07:04Z", "color": null}, {"id": "kobo-annot-c5e0928c44cc66c8", "source": "kobo", "text": "The last rule of labeling is silence. Once you’ve thrown out a label, be quiet and listen. We all have a tendency to expand on what we’ve said, to finish, “It seems like you like the way that shirt looks,” with a specific question like “Where did you get it?” But a label’s power is that it invites the other person to reveal himself.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-25T22:05:38Z", "color": null}, {"id": "kobo-annot-ac79090562465f45", "source": "kobo", "text": "Notice we said “It sounds like . . .” and not “I’m hearing that . . .” That’s because the word “I” gets people’s guard up. When you say “I,” it says you’re more interested in yourself than the other person, and it makes you take personal responsibility for the words that follow—and the offense they might cause.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-25T22:03:40Z", "color": null}, {"id": "kobo-annot-a431d2cb10265903", "source": "kobo", "text": "Labeling is a way of validating someone’s emotion by acknowledging it. Give someone’s emotion a name and you show you identify with how that person feels. It gets you close to someone without asking about external factors you know nothing about (“How’s your family?”). Think of labeling as a shortcut to intimacy, a time-saving emotional hack.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-25T21:58:01Z", "color": null}, {"id": "kobo-annot-517ec15972221ee2", "source": "kobo", "text": "Empathy is a classic “soft” communication skill, but it has a physical basis. When we closely observe a person’s face, gestures, and tone of voice, our brain begins to align with theirs in a process called neural resonance, and that lets us know more fully what they think and feel.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-25T21:52:28Z", "color": null}, {"id": "kobo-annot-e97f38a5e42b6368", "source": "kobo", "text": "Tactical empathy is understanding the feelings and mindset of another in the moment and also hearing what is behind those feelings so you increase your influence in all the moments that follow. It’s bringing our attention to both the emotional obstacles and the potential pathways to getting an agreement done.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-25T21:49:40Z", "color": null}, {"id": "kobo-annot-88f8c1dc51cefd0d", "source": "kobo", "text": "Notice I didn’t say anything about agreeing with the other person’s values and beliefs or giving out hugs. That’s sympathy. What I’m talking about is trying to understand a situation from another person’s perspective.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-25T21:49:29Z", "color": null}, {"id": "kobo-annot-2341905e96c90191", "source": "kobo", "text": "Most of us enter verbal combat unlikely to persuade anyone of anything because we only know and care about our own goals and perspective.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-25T17:39:52Z", "color": null}, {"id": "kobo-annot-58f7240d4a42bd4d", "source": "kobo", "text": "There is nothing more frustrating or disruptive to any negotiation than to get the feeling you are talking to someone who isn’t listening. Playing dumb is a valid negotiating technique, and “I don’t understand” is a legitimate response. But ignoring the other party’s position only builds up frustration and makes them less likely to do what you want.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-25T17:30:08Z", "color": null}, {"id": "kobo-annot-a80200c80c452375", "source": "kobo", "text": ". You can learn almost everything you need—and a lot more than other people would like you to know—simply by watching and listening, keeping your eyes peeled and your ears open, and your mouth shut.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-25T17:26:57Z", "color": null}, {"id": "kobo-annot-a6f5a9d9b5bca2e4", "source": "kobo", "text": "They are able to precisely label emotions, those of others and especially their own. And once they label the emotions they talk about them without getting wound up. For them, emotion is a tool.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-25T17:26:08Z", "color": null}, {"id": "kobo-annot-a1f5639b9ec02574", "source": "kobo", "text": "Mirrors work magic. Repeat the last three words (or the critical one to three words) of what someone has just said. We fear what’s different and are drawn to what’s similar. Mirroring is the art of insinuating similarity, which facilitates bonding. Use mirrors to encourage the other side to empathize and bond with you, keep people talking, buy your side time to regroup, and encourage your counterparts to reveal their strategy.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-24T14:38:07Z", "color": null}, {"id": "kobo-annot-0f11a505f8fe38e1", "source": "kobo", "text": "The direct or assertive voice: Used rarely. Will cause problems and create pushback.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-24T14:38:00Z", "color": null}, {"id": "kobo-annot-ee3e7696341df922", "source": "kobo", "text": "2.The positive/playful voice: Should be your default voice. It’s the voice of an easygoing, good-natured person. Your attitude is light and encouraging. The key here is to relax and smile while you’re talking.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-24T14:37:47Z", "color": null}, {"id": "kobo-annot-0ced99bae32c6105", "source": "kobo", "text": "1.The late-night FM DJ voice: Use selectively to make a point. Inflect your voice downward, keeping it calm and slow. When done properly, you create an aura of authority and trustworthiness without triggering defensiveness.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-24T14:37:36Z", "color": null}, {"id": "kobo-annot-aedfeeebeb426bb7", "source": "kobo", "text": "their head. Negotiation is not an act of battle; it’s a process of discovery. The goal is to uncover as much information as possible. ■To quiet the voices in your head, make your sole and all-encompassing focus the other person and what they have to say. ■Slow. It. Down. Going too fast is one of the mistakes all negotiators are prone to making. If we’re too much in a hurry, people can feel as if they’re not being heard. You risk undermining the rapport and trust you’ve built. ■Put a smile on your face. When people are in a positive frame of mind, they think more quickly, and are more likely to collaborate and problem-solve (instead of fight and resist). Positivity creates mental agility in both you and your counterpart.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-24T14:37:31Z", "color": null}, {"id": "kobo-annot-0698b8ad5aca8ac3", "source": "kobo", "text": "A good negotiator prepares, going in, to be ready for possible surprises; a great negotiator aims to use her skills to reveal the surprises she is certain to find. ■Don’t commit to assumptions; instead, view them as hypotheses and use the negotiation to test them rigorously. ■People who view negotiation as a battle of arguments become overwhelmed by the voices in", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-24T14:37:01Z", "color": null}, {"id": "kobo-annot-d450be1a10912264", "source": "kobo", "text": "Most of the time, you should be using the positive/playful voice. It’s the voice of an easygoing, good-natured person. Your attitude is light and encouraging. The key here is to relax and smile while you’re talking. A smile, even while talking on the phone, has an impact tonally that the other person will pick up on.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-24T13:58:05Z", "color": null}, {"id": "kobo-annot-79aeedbbdf3ffea6", "source": "kobo", "text": "On a mostly unconscious level, we can understand the minds of others not through any kind of thinking but through quite literally grasping what the other is feeling.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-24T13:18:36Z", "color": null}, {"id": "kobo-annot-df8f7aa95fa118cf", "source": "kobo", "text": "but it’s how we are (our general demeanor and delivery) that is both the easiest thing to enact and the most immediately effective mode of influence.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-24T13:18:07Z", "color": null}, {"id": "kobo-annot-a5ea9df7fb8bd47f", "source": "kobo", "text": "There’s plenty of research that now validates the passage of time as one of the most important tools for a negotiator.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-23T21:51:10Z", "color": null}, {"id": "kobo-annot-9c87f49211ebdf93", "source": "kobo", "text": "Wants are easy to talk about, representing the aspiration of getting our way, and sustaining any illusion of control we have as we begin to negotiate; needs imply survival, the very minimum required to make us act, and so make us vulnerable. But neither wants nor needs are where we start; it begins with listening, making it about the other people, validating their emotions, and creating enough trust and safety for a real conversation to begin.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-23T21:44:46Z", "color": null}, {"id": "kobo-annot-5974dd87263802fd", "source": "kobo", "text": "There’s one powerful way to quiet the voice in your head and the voice in their head at the same time: treat two schizophrenics with just one pill. Instead of prioritizing your argument—in fact, instead of doing any thinking at all in the early goings about what you’re going to say—make your sole and all-encompassing focus the other person and what they have to say. In that mode of true active listening", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-23T20:22:54Z", "color": null}, {"id": "kobo-annot-66a25a711ae0c50f", "source": "kobo", "text": "George A. Miller persuasively put forth the idea that we can process only about seven pieces of information in our conscious mind at any given moment. In other words, we are easily overwhelmed.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-23T20:21:27Z", "color": null}, {"id": "kobo-annot-0f6fa42e470838cf", "source": "kobo", "text": "Just remember, to successfully negotiate it is critical to prepare.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-23T20:02:18Z", "color": null}, {"id": "kobo-annot-d0a938fcf3d441ee", "source": "kobo", "text": "Negotiation as you’ll learn it here is nothing more than communication with results. Getting what you want out of life is all about getting what you want from—and with—other people. Conflict between two parties is inevitable in all relationships. So it’s useful—crucial, even—to know how to engage in that conflict to get what you want without inflicting damage.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-23T19:46:11Z", "color": null}, {"id": "kobo-annot-7ff9fb9cdb69a3ca", "source": "kobo", "text": "Psychotherapy research shows that when individuals feel listened to, they tend to listen to themselves more carefully and to openly evaluate and clarify their own thoughts and feelings. In addition, they tend to become less defensive and oppositional and more willing to listen to other points of view, which gets them to the calm and logical place where they can be good Getting to Yes problem solvers.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-23T19:42:59Z", "color": null}, {"id": "kobo-annot-bf05601d44342e93", "source": "kobo", "text": "It all starts with the universally applicable premise that people want to be understood and accepted. Listening is the cheapest, yet most effective concession we can make to get there.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-23T19:41:45Z", "color": null}, {"id": "kobo-annot-c141fee3169089a0", "source": "kobo", "text": "System 1’s inchoate beliefs, feelings, and impressions are the main sources of the explicit beliefs and deliberate choices of System 2. They’re the spring that feeds the river. We react emotionally (System 1) to a suggestion or question. Then that System 1 reaction informs and in effect creates the System 2 answer.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-23T19:33:28Z", "color": null}, {"id": "kobo-annot-f07fa0ba6df63ccd", "source": "kobo", "text": "Kahneman later codified his research in the 2011 bestseller Thinking, Fast and Slow.3 Man, he wrote, has two systems of thought: System 1, our animal mind, is fast, instinctive, and emotional; System 2 is slow, deliberative, and logical. And System 1 is far more influential. In fact, it guides and steers our rational thoughts.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-23T19:32:47Z", "color": null}, {"id": "kobo-annot-ba2763c4389fa039", "source": "kobo", "text": "humans all suffer from Cognitive Bias, that is, unconscious—and irrational—brain processes that literally distort the way we see the world. Kahneman and Tversky discovered more than 150 of them.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-23T19:28:47Z", "color": null}, {"id": "kobo-annot-13b7cc995f5376ba", "source": "kobo", "text": "This mentality baffled Kahneman, who from years in psychology knew that, in his words, “[I]t is self-evident that people are neither fully rational nor completely selfish, and that their tastes are anything but stable.”", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-23T19:27:57Z", "color": null}, {"id": "kobo-annot-fcbaadc7fbeeb2fa", "source": "kobo", "text": "Feeling, they discovered, is a form of thinking.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-23T19:26:39Z", "color": null}, {"id": "kobo-annot-361437ad1d74a765", "source": "kobo", "text": "Their system was easy to follow and seductive, with four basic tenets. One, separate the person—the emotion—from the problem; two, don’t get wrapped up in the other side’s position (what they’re asking for) but instead focus on their interests (why they’re asking for it) so that you can find what they really want; three, work cooperatively to generate win-win options; and, four, establish mutually agreed-upon standards for evaluating those possible solutions. It was a brilliant, rational, and profound synthesis of the most advanced game theory and legal thinking of the day. For years after that book came out, everybody—including the FBI and the NYPD—focused on a problem-solving approach to bargaining interactions. It just seemed so modern and smart.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-23T19:25:01Z", "color": null}, {"id": "kobo-annot-e029656ababa703d", "source": "kobo", "text": "Fisher and Ury’s approach was basically to systematize problem solving so that negotiating parties could reach a mutually beneficial deal—the getting to “Yes” in the title. Their core assumption was that the emotional brain—that animalistic, unreliable, and irrational beast—could be overcome through a more rational, joint problem-solving mindset.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-23T19:24:34Z", "color": null}, {"id": "kobo-annot-e00c37f1493d5283", "source": "kobo", "text": "Two years later, Roger Fisher and William Ury—cofounders of the project—came out with Getting to Yes,2 a groundbreaking treatise on negotiation that totally changed the way practitioners thought about the field.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-23T19:24:15Z", "color": null}, {"id": "kobo-annot-7ebaffad9bc6ff69", "source": "kobo", "text": "I was employing what had become one of the FBI’s most potent negotiating tools: the open-ended question.", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-23T19:19:35Z", "color": null}, {"id": "kobo-annot-356d840f6c912e7b", "source": "kobo", "text": "“I’m just asking questions,” I said. “It’s a passive-aggressive approach. I just ask the same three or four open-ended questions over and over and over and over. They get worn out answering and give me everything I want.” Andy jumped in his seat as if he’d been stung by a bee. “Damn!” he said. “That’s what happened. I had no idea.”", "note": null, "title": "Never Split the Difference", "author": "Chris Voss", "url": null, "created_at": "2026-02-23T19:16:31Z", "color": null}, {"id": "kobo-annot-7951c86f653498ba", "source": "kobo", "text": "Everything that happens once can never happen again. But everything that happens twice will surely happen a third time.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-19T21:34:58Z", "color": null}, {"id": "kobo-annot-96c45364cad064a4", "source": "kobo", "text": "There is only one thing that makes a dream impossible to achieve: the fear of failure.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-19T21:03:33Z", "color": null}, {"id": "kobo-annot-4fbb42282989c355", "source": "kobo", "text": ". There was no need to imprison them: the Arabs simply confiscated their horses. So, once again, the world had demonstrated its many languages: the desert only moments ago had been endless and free, and now it was an impenetrable wall. \"", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-19T21:01:50Z", "color": null}, {"id": "kobo-annot-7905f3d4044b7616", "source": "kobo", "text": "\"Treason is a blow that comes unexpectedly. If you know your heart well, it will never be able to do that to you. Because you'll know its dreams and wishes, and will know how to deal with them.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-15T21:43:37Z", "color": null}, {"id": "kobo-annot-8bd8e9617a6df7e5", "source": "kobo", "text": "There is only one way to learn,\" the alchemist answered. \"It's through action. Everything you need to know you have learned through your journey. You need to learn only one thing more.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-15T21:36:06Z", "color": null}, {"id": "kobo-annot-f875ca1f39693647", "source": "kobo", "text": ". And, as the camel driver had said, to die tomorrow was no worse than dying on any other day. Every day was there to be lived or to mark one's departure from this world. Everything depended on one word: \"Maktub.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-15T21:06:38Z", "color": null}, {"id": "kobo-annot-3732bd1f6c2b4bbe", "source": "kobo", "text": "If you pay attention to the present, you can improve upon it. And, if you improve on the present, what comes later will also be better. Forget about the future, and live each day according to the teachings, confident that God loves his children. Each day, in itself, brings with it an eternity.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-15T20:56:46Z", "color": null}, {"id": "kobo-annot-373f32af06b60fb4", "source": "kobo", "text": "Don't be impatient,\" he repeated to himself. \"It's like the camel driver said: 'Eat when it's time to eat. And move along when it's time to move along.'", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-14T19:20:35Z", "color": null}, {"id": "kobo-annot-835b0c50f076fbbf", "source": "kobo", "text": "Life will be a party for you, a grand festival, because life is the moment we're living right now.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-14T19:08:33Z", "color": null}, {"id": "kobo-annot-9e3f11dc2bfce040", "source": "kobo", "text": ". If you can concentrate always on the present, you'll be a happy man.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-14T19:07:17Z", "color": null}, {"id": "kobo-annot-b1e7043b304618f7", "source": "kobo", "text": "Once you get into the desert, there's no going back,\" said the camel driver. \"And, when you can't go back, you have to worry only about the best way of moving forward.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-13T21:18:21Z", "color": null}, {"id": "kobo-annot-45305c9ed6b2820b", "source": "kobo", "text": "When someone makes a decision, he is really diving into a strong current that will carry him to places he had never dreamed of when he first made the decision.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-13T20:59:24Z", "color": null}, {"id": "kobo-annot-c8e1839c848e45b5", "source": "kobo", "text": "He suddenly felt tremendously happy. He could always go back to being a shepherd. He could always become a crystal salesman again.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-13T19:46:37Z", "color": null}, {"id": "kobo-annot-b4547689d7912721", "source": "kobo", "text": "It's called the principle of favorability. Or beginner's luck.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-13T19:29:48Z", "color": null}, {"id": "kobo-annot-66657e7c21408186", "source": "kobo", "text": "But the crystal merchant had no choice. He had lived thirty years of his life buying and selling crystal pieces, and now it was too late to do anything else.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-13T19:22:14Z", "color": null}, {"id": "kobo-annot-e3b04e76cb1410f4", "source": "kobo", "text": "All things are one,\" the old man had said.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-13T19:20:36Z", "color": null}, {"id": "kobo-annot-eb34a45dfb52c3f9", "source": "kobo", "text": "This candy merchant isn't making candy so that later he can travel or marry a shopkeeper's daughter. He's doing it because it's what he wants to do,\" thought the boy.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-13T19:18:48Z", "color": null}, {"id": "kobo-annot-e8cdeee72cbe418d", "source": "kobo", "text": "He looked around at the empty plaza again, feeling less desperate than before. This wasn't a strange place; it was a new one.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-13T19:16:05Z", "color": null}, {"id": "kobo-annot-ab4372532c2cb4aa", "source": "kobo", "text": "Well, there is only one piece of advice I can give you,' said the wisest of wise men. 'The secret of happiness is to see all the marvels of the world, and never to forget the drops of oil on the spoon.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-13T18:55:43Z", "color": null}, {"id": "kobo-annot-2209de000eb97aac", "source": "kobo", "text": "and when each day is the same as the next, it's because people fail to recognize the good things that happen in their lives every day that the sun rises. I", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-13T18:48:18Z", "color": null}, {"id": "kobo-annot-966c0ba89f1eb49b", "source": "kobo", "text": "The old man continued, \"In the long run, what people think about shepherds and bakers becomes more important for them than their own destinies.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-12T21:07:50Z", "color": null}, {"id": "kobo-annot-5ab37f9a0a09e7cc", "source": "kobo", "text": ". That was what made traveling appeal to him—he always made new friends, and he didn't need to spend all of his time with them. When someone sees the same people every day, as had happened with him at the seminary, they wind up becoming a part of that person's life. And then they want the person to change. If someone isn't what others want them to be, the others become angry. Everyone seems to have a clear idea of how other people should lead their lives, but none about his or her own.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-12T20:55:49Z", "color": null}, {"id": "kobo-annot-b4e27fab1b566c24", "source": "kobo", "text": "We have to be prepared for change, he thought, and he was grateful for the jacket's weight and warmth.", "note": null, "title": "The Alchemist", "author": "Paolo Coelho", "url": null, "created_at": "2026-01-12T20:39:02Z", "color": null}, {"id": "kobo-annot-dbc4b86454da13f1", "source": "kobo", "text": "De ouderdom is niet beter en nauwelijks even bevoegd tot onderricht geven dan de jeugd, want hij heeft meer verloren dan gewonnen.", "note": null, "title": "Walden", "author": "Henry David Thoreau", "url": null, "created_at": "2026-01-12T19:32:47Z", "color": null}, {"id": "kobo-annot-62cedcbf60d671b1", "source": "kobo", "text": ". Maar zij die wakker en gezond van aard zijn, beseffen dat de zon helder is opgekomen. Het is nooit te laat om onze vooroordelen te laten varen. Geen enkele manier van denken of doen, hoe oud ook, is te vertrouwen zonder bewijs. Wat iedereen vandaag de dag napraat of in stilte voor waarheid houdt, kan morgen vals blijken, en alleen maar wat rook van meningen die sommigen vol vertrouwen aanzagen voor een wolk die hun velden met vruchtbare regen zou besprenkelen. Je probeert iets te doen wat je volgens mensen van vroeger niet kunt, en je merkt dat je het kunt. Oude daden voor oude mensen, en nieuwe daden voor nieuwe.", "note": null, "title": "Walden", "author": "Henry David Thoreau", "url": null, "created_at": "2026-01-12T19:32:03Z", "color": null}, {"id": "kobo-annot-f6582c10de286d2f", "source": "kobo", "text": "Feitelijk heeft de zwoegende mens geen gelegenheid om van dag tot dag zijn ware zelf te zijn; hij kan zich de menselijkste verhoudingen tot de mensen niet veroorloven; de marktwaarde van zijn arbeid zou erdoor dalen. Hij heeft geen tijd om iets anders te zijn dan een machine. Hoe kan degene die zijn kennis zo vaak moet benutten zich goed bewust worden van zijn onkunde – wat nodig is voor zijn groei?", "note": null, "title": "Walden", "author": "Henry David Thoreau", "url": null, "created_at": "2026-01-11T20:33:21Z", "color": null}, {"id": "kobo-annot-dc53b5a717e2908d", "source": "kobo", "text": "From thence our kind hard-hearted is, enduring pain and care, Approving that our bodies of a stony nature are.", "note": null, "title": "Walden", "author": "Henry David Thoreau", "url": null, "created_at": "2026-01-09T21:51:01Z", "color": null}, {"id": "kobo-annot-b057ba3cf83244b0", "source": "kobo", "text": ", waarin je slapen kunt, als je niet wordt voortgejaagd door het besef te moeten inhalen wat je overdag verzuimd hebt, te moeten goedmaken wat je hebt verknoeid.", "note": null, "title": "Nooit meer slapen", "author": "Willem Frederik Hermans", "url": null, "created_at": "2025-12-27T19:33:05Z", "color": null}, {"id": "kobo-annot-8fcf001c679be676", "source": "kobo", "text": "Arne is beter toegerust om succes te hebben dan ik en zelfs hij gunt zichzelf niets, uit angst dat het hem niet zal lukken een belangrijke wetenschappelijke prestatie te verrichten.", "note": null, "title": "Nooit meer slapen", "author": "Willem Frederik Hermans", "url": null, "created_at": "2025-12-23T21:24:20Z", "color": null}, {"id": "kobo-annot-b1a8a77157772a16", "source": "kobo", "text": "der ewig Betrogene des Universums.", "note": null, "title": "Nooit meer slapen", "author": "Willem Frederik Hermans", "url": null, "created_at": "2025-12-17T21:05:45Z", "color": null}, {"id": "kobo-annot-cec9d28ce8d6564b", "source": "kobo", "text": "Wie durft vertrouwen dat het op een wereld waar al zoveel offers totaal voor niets gebracht zijn, mogelijk is ook maar een enkel offer te brengen dat zin heeft?", "note": null, "title": "Nooit meer slapen", "author": "Willem Frederik Hermans", "url": null, "created_at": "2025-12-15T21:31:48Z", "color": null}, {"id": "kobo-annot-138f12f445dc598b", "source": "kobo", "text": "Maar wat een beproeving: te moeten ondervinden hoever de wonderlijkheid van je eigen lichaam reikt.", "note": null, "title": "Nooit meer slapen", "author": "Willem Frederik Hermans", "url": null, "created_at": "2025-12-12T22:23:44Z", "color": null}, {"id": "kobo-annot-759e12770fc3eba2", "source": "kobo", "text": "Ik geloof soms dat de koppigheid waarmee mensen aan tradities vasthouden, voldoende is om iedere hoop op te geven dat de mensheid door rationele maatregelen gelukkiger zal worden.", "note": null, "title": "Nooit meer slapen", "author": "Willem Frederik Hermans", "url": null, "created_at": "2025-12-09T21:38:45Z", "color": null}, {"id": "kobo-annot-c2b178115d19125e", "source": "kobo", "text": "roald amundsen", "note": null, "title": "Nooit meer slapen", "author": "Willem Frederik Hermans", "url": null, "created_at": "2025-12-09T21:31:56Z", "color": null}, {"id": "kobo-annot-efc7ce37a494a411", "source": "kobo", "text": "De meeste mensen baseren hun zelfrespect op een of ander gebrek aan comfort.", "note": "Mooie zin", "title": "Nooit meer slapen", "author": "Willem Frederik Hermans", "url": null, "created_at": "2025-12-09T21:26:57Z", "color": null}]};</script>
<script>
/* =========================================================================
 *  Marginalia — viewer voor highlights.json
 *
 *  Alle state (cached data, favorieten, view-keuze) staat in localStorage.
 *  Geen netwerkcalls behalve een poging tot fetch('highlights.json') op load.
 * ========================================================================= */

const LS = {
  data:   "marg.data.v1",      // gecachete highlights (volledige JSON)
  favs:   "marg.favs.v1",      // Set<string>: id's van favoriete highlights
  tab:    "marg.tab.v1",
  daily:  "marg.daily.v1",     // { date: 'YYYY-MM-DD', ids: [...] }
  theme:  "marg.theme.v1",     // 'light' | 'dark' | null (= volg systeem)
};

const DAILY_COUNT = 5;

const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => [...root.querySelectorAll(sel)];

let STATE = {
  data: null,            // { generated_at, count, highlights: [] }
  favs: new Set(),
  tab:  "daily",
  search: "",
  filter: "all",         // all | kobo | instapaper
};

/* ---------- storage helpers ---------- */
function loadFavs(){
  try{
    const raw = localStorage.getItem(LS.favs);
    return new Set(raw ? JSON.parse(raw) : []);
  }catch{ return new Set(); }
}
function saveFavs(){
  localStorage.setItem(LS.favs, JSON.stringify([...STATE.favs]));
}
function loadCachedData(){
  try{
    const raw = localStorage.getItem(LS.data);
    return raw ? JSON.parse(raw) : null;
  }catch{ return null; }
}
function saveCachedData(d){
  try{ localStorage.setItem(LS.data, JSON.stringify(d)); }
  catch(e){ console.warn("Kon data niet cachen (te groot voor localStorage?):", e); }
}

/* ---------- seedable PRNG (mulberry32) ---------- */
function hashStr(s){
  let h = 2166136261 >>> 0;
  for (let i=0;i<s.length;i++){
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}
function mulberry32(seed){
  let a = seed >>> 0;
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function pickRandom(arr, n, rng){
  // Fisher–Yates op een kopie, eerste n nemen
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a.slice(0, n);
}

/* ---------- data ingestion ---------- */
async function tryFetchLocal(){
  try{
    const r = await fetch("highlights.json", {cache:"no-store"});
    if (!r.ok) return null;
    return await r.json();
  }catch{
    return null;
  }
}

function ingestData(d){
  if (!d || !Array.isArray(d.highlights)){
    alert("Dit bestand bevat geen highlights-array.");
    return;
  }
  STATE.data = d;
  saveCachedData(d);
  render();
}

/* ---------- rendering ---------- */
function escapeHtml(s){
  return (s ?? "").replace(/[&<>"']/g, c => ({
    "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;"
  })[c]);
}
function highlightText(text, q){
  const safe = escapeHtml(text);
  if (!q) return safe;
  const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi");
  return safe.replace(re, "<mark>$1</mark>");
}

function highlightCard(h, q=""){
  const isFav = STATE.favs.has(h.id);
  const titlePart = h.url
    ? `<a href="${escapeHtml(h.url)}" target="_blank" rel="noreferrer noopener" class="title">${escapeHtml(h.title)}</a>`
    : `<span class="title">${escapeHtml(h.title)}</span>`;
  const authorPart = h.author ? `<span class="author">${escapeHtml(h.author)}</span>` : "";
  const noteHtml = h.note ? `<div class="note">${highlightText(h.note, q)}</div>` : "";
  return `
    <article class="hl" data-id="${escapeHtml(h.id)}">
      <p class="text">${highlightText(h.text, q)}</p>
      ${noteHtml}
      <footer>
        <span class="src">
          <span class="badge ${h.source}">${h.source === "kobo" ? "Kobo" : "Instapaper"}</span>
          ${titlePart}${authorPart}
        </span>
        <span class="actions">
          <button class="fav ${isFav ? "on" : ""}" data-act="fav">${isFav ? "◉ favoriet" : "○ favoriet"}</button>
          <button data-act="copy">kopieer</button>
        </span>
      </footer>
    </article>`;
}

function renderLoader(message){
  return `
    <div class="loader" id="loader">
      <h2>Highlights laden</h2>
      <p>${message}</p>
      <label class="filebtn">
        Kies highlights.json
        <input type="file" id="filein" accept=".json,application/json" hidden>
      </label>
      <p style="margin-top:14px;font-size:13px;color:var(--ink-muted)">
        of sleep het bestand op deze pagina
      </p>
    </div>`;
}

function renderDaily(){
  const all = STATE.data.highlights;
  if (all.length === 0){
    return `<div class="empty">Nog geen highlights in deze dataset.</div>`;
  }

  const today = new Date().toISOString().slice(0,10); // YYYY-MM-DD
  let dailyState;
  try{
    dailyState = JSON.parse(localStorage.getItem(LS.daily) || "null");
  }catch{ dailyState = null; }

  let ids;
  if (dailyState && dailyState.date === today && Array.isArray(dailyState.ids) && !dailyState.shuffled){
    ids = dailyState.ids;
  } else {
    const seedBase = dailyState && dailyState.date === today && dailyState.shuffled
      ? today + "-" + dailyState.shuffleCount
      : today;
    const rng = mulberry32(hashStr(seedBase));
    const picks = pickRandom(all, Math.min(DAILY_COUNT, all.length), rng);
    ids = picks.map(p => p.id);
    localStorage.setItem(LS.daily, JSON.stringify({
      date: today, ids,
      shuffled: !!(dailyState && dailyState.shuffled),
      shuffleCount: dailyState?.shuffleCount || 0,
    }));
  }

  const byId = new Map(all.map(h => [h.id, h]));
  const items = ids.map(id => byId.get(id)).filter(Boolean);

  const dateLabel = new Date().toLocaleDateString("nl-NL", {
    weekday:"long", day:"numeric", month:"long", year:"numeric"
  });

  return `
    <section>
      <div class="daily-head">
        <h2>${dateLabel}</h2>
        <button class="reshuffle" id="reshuffle">Nieuwe set</button>
      </div>
      ${items.map(h => highlightCard(h)).join("")}
    </section>`;
}

function renderBrowse(){
  const all = STATE.data.highlights;
  const q = STATE.search.trim().toLowerCase();
  const f = STATE.filter;

  let pool = all;
  if (f === "kobo" || f === "instapaper") pool = pool.filter(h => h.source === f);

  if (q){
    pool = pool.filter(h =>
      (h.text  || "").toLowerCase().includes(q) ||
      (h.title || "").toLowerCase().includes(q) ||
      (h.author|| "").toLowerCase().includes(q) ||
      (h.note  || "").toLowerCase().includes(q)
    );
  }

  // Group by title
  const groups = new Map();
  for (const h of pool){
    const key = h.title || "Onbekend";
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(h);
  }

  const filterChips = `
    <div class="filters">
      ${["all","kobo","instapaper"].map(k =>
        `<button class="chip ${STATE.filter === k ? "active":""}" data-filter="${k}">${
          k==="all" ? "Alles" : k==="kobo" ? "Kobo" : "Instapaper"
        }</button>`
      ).join("")}
    </div>`;

  const head = `
    <div class="browse-head">
      <div class="search">
        <input id="searchbox" type="search" placeholder="Zoek in tekst, titel, auteur, aantekening…" value="${escapeHtml(STATE.search)}">
        <span class="count">${pool.length} / ${all.length}</span>
      </div>
      ${filterChips}
    </div>`;

  if (pool.length === 0){
    return head + `<div class="empty">Geen highlights gevonden.</div>`;
  }

  // Sort groups by name
  const sortedGroups = [...groups.entries()].sort((a,b) => a[0].localeCompare(b[0], "nl"));
  const openIfSearching = q ? "open" : "";

  const body = sortedGroups.map(([title, items]) => {
    const author = items[0].author;
    return `
      <details class="book" ${openIfSearching}>
        <summary>
          <span class="booktitle">${escapeHtml(title)}</span>
          ${author ? `<span class="bookauthor">${escapeHtml(author)}</span>` : ""}
          <span class="bookcount">${items.length}</span>
        </summary>
        <div class="book-items">
          ${items.map(h => highlightCard(h, q)).join("")}
        </div>
      </details>`;
  }).join("");

  return head + body;
}

function renderFavs(){
  const all = STATE.data.highlights;
  const items = all.filter(h => STATE.favs.has(h.id));
  if (items.length === 0){
    return `<div class="empty">Nog geen favorieten — markeer een highlight met ○ favoriet.</div>`;
  }
  return `
    <div class="daily-head">
      <h2>${items.length} favoriet${items.length===1?"":"en"}</h2>
    </div>
    ${items.map(h => highlightCard(h)).join("")}`;
}

function render(){
  const root = $("#root");

  if (!STATE.data){
    root.innerHTML = renderLoader("Sleep <code>highlights.json</code> hierheen, of kies het bestand.");
    $("#tabs").hidden = true;
    $("#footbar").hidden = true;
    $("#meta").textContent = "geen data geladen";
    return;
  }

  $("#tabs").hidden = false;
  $("#footbar").hidden = false;
  const total = STATE.data.highlights.length;
  $("#meta").textContent = `${total} highlights`;
  const gen = STATE.data.generated_at
    ? new Date(STATE.data.generated_at).toLocaleString("nl-NL", {dateStyle:"medium", timeStyle:"short"})
    : "onbekend";
  $("#datastamp").textContent = `gegenereerd: ${gen}`;

  // Tab buttons state
  for (const b of $$("nav.tabs button")){
    b.classList.toggle("active", b.dataset.tab === STATE.tab);
  }

  if (STATE.tab === "daily"){
    root.innerHTML = renderDaily();
  } else if (STATE.tab === "browse"){
    root.innerHTML = renderBrowse();
    // restore focus on search if user was typing
    const sb = $("#searchbox");
    if (sb && document.activeElement?.id !== "searchbox" && STATE.search){
      // place caret at end
      sb.setSelectionRange(sb.value.length, sb.value.length);
    }
  } else if (STATE.tab === "favs"){
    root.innerHTML = renderFavs();
  }
}

/* ---------- event delegation ---------- */
document.addEventListener("click", (e) => {
  // Tab switch
  const tabBtn = e.target.closest("nav.tabs button");
  if (tabBtn){
    STATE.tab = tabBtn.dataset.tab;
    localStorage.setItem(LS.tab, STATE.tab);
    render();
    return;
  }

  // Filter chip
  const chip = e.target.closest(".chip");
  if (chip){
    STATE.filter = chip.dataset.filter;
    render();
    return;
  }

  // Reshuffle daily
  if (e.target.id === "reshuffle"){
    const today = new Date().toISOString().slice(0,10);
    let prev;
    try{ prev = JSON.parse(localStorage.getItem(LS.daily) || "null"); }catch{ prev = null; }
    const count = (prev?.shuffleCount || 0) + 1;
    localStorage.setItem(LS.daily, JSON.stringify({
      date: today, ids: [], shuffled: true, shuffleCount: count
    }));
    render();
    return;
  }

  // Per-card actions
  const actBtn = e.target.closest(".actions button");
  if (actBtn){
    const card = actBtn.closest("article.hl");
    const id = card?.dataset.id;
    if (!id) return;
    const h = STATE.data.highlights.find(x => x.id === id);
    if (!h) return;

    if (actBtn.dataset.act === "fav"){
      if (STATE.favs.has(id)) STATE.favs.delete(id); else STATE.favs.add(id);
      saveFavs();
      // local toggle without full re-render
      actBtn.classList.toggle("on");
      actBtn.textContent = STATE.favs.has(id) ? "◉ favoriet" : "○ favoriet";
    } else if (actBtn.dataset.act === "copy"){
      const blob = h.text + (h.author ? `\n— ${h.author}` : "") + (h.title ? ` (${h.title})` : "");
      navigator.clipboard.writeText(blob).then(() => {
        const t = actBtn.textContent;
        actBtn.textContent = "gekopieerd!";
        setTimeout(() => { actBtn.textContent = t; }, 1200);
      });
    }
    return;
  }

  // Reload
  if (e.target.id === "reload"){
    $("#filein-hidden")?.click();
    return;
  }
  if (e.target.id === "exportfavs"){
    exportFavs();
    return;
  }
  if (e.target.id === "wipe"){
    if (confirm("Lokale opslag wissen? Hiermee verdwijnen je gecachete data, favorieten en dagstaat.")){
      localStorage.removeItem(LS.data);
      localStorage.removeItem(LS.favs);
      localStorage.removeItem(LS.daily);
      localStorage.removeItem(LS.tab);
      STATE = { data:null, favs:new Set(), tab:"daily", search:"", filter:"all" };
      render();
    }
    return;
  }
});

document.addEventListener("input", (e) => {
  if (e.target.id === "searchbox"){
    STATE.search = e.target.value;
    render();
    // re-focus and put caret at end
    const sb = $("#searchbox");
    if (sb){ sb.focus(); sb.setSelectionRange(sb.value.length, sb.value.length); }
  }
});

document.addEventListener("change", (e) => {
  if (e.target.id === "filein" || e.target.id === "filein-hidden"){
    const f = e.target.files?.[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try{ ingestData(JSON.parse(r.result)); }
      catch(err){ alert("Kan JSON niet lezen: " + err.message); }
    };
    r.readAsText(f);
  }
});

/* ---------- drag & drop ---------- */
["dragenter","dragover"].forEach(ev =>
  document.addEventListener(ev, e => {
    e.preventDefault();
    $("#loader")?.classList.add("drag");
  })
);
["dragleave","drop"].forEach(ev =>
  document.addEventListener(ev, e => {
    e.preventDefault();
    $("#loader")?.classList.remove("drag");
  })
);
document.addEventListener("drop", (e) => {
  const f = e.dataTransfer?.files?.[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{ ingestData(JSON.parse(r.result)); }
    catch(err){ alert("Kan JSON niet lezen: " + err.message); }
  };
  r.readAsText(f);
});

/* ---------- favorites export ---------- */
function exportFavs(){
  if (!STATE.data){ alert("Geen data."); return; }
  const items = STATE.data.highlights.filter(h => STATE.favs.has(h.id));
  if (items.length === 0){ alert("Nog geen favorieten."); return; }
  const out = {
    exported_at: new Date().toISOString(),
    count: items.length,
    highlights: items,
  };
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `marginalia-favorites-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ---------- hidden file input for "reload" link ---------- */
{
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = ".json,application/json";
  inp.id = "filein-hidden"; inp.hidden = true;
  document.body.appendChild(inp);
}

/* ---------- theme management ---------- */
const THEME_ICONS = {
  // klein moon-pictogram (gebruiker zit in lichte modus → klikken voor donker)
  light: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
  // klein zon-pictogram (gebruiker zit in donker → klikken voor licht)
  dark:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.93" y1="4.93" x2="7.05" y2="7.05"/><line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/><line x1="4.93" y1="19.07" x2="7.05" y2="16.95"/><line x1="16.95" y1="7.05" x2="19.07" y2="4.93"/></svg>',
};

function currentTheme(){
  // Wat is er nu daadwerkelijk actief? Gebruik expliciete keuze, anders systeem.
  const explicit = document.documentElement.getAttribute("data-theme");
  if (explicit === "light" || explicit === "dark") return explicit;
  return matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
}

function applyTheme(theme){
  // theme: 'light' | 'dark' | null (= volg systeem)
  if (theme === "light" || theme === "dark"){
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem(LS.theme, theme);
  } else {
    document.documentElement.removeAttribute("data-theme");
    localStorage.removeItem(LS.theme);
  }
  updateThemeIcon();
}

function updateThemeIcon(){
  const btn = $("#themetoggle");
  if (!btn) return;
  btn.innerHTML = THEME_ICONS[currentTheme()];
}

function toggleTheme(){
  applyTheme(currentTheme() === "dark" ? "light" : "dark");
}

// Reageer op systeemveranderingen wanneer de gebruiker geen expliciete keuze heeft.
matchMedia("(prefers-color-scheme: dark)").addEventListener?.("change", () => {
  if (!localStorage.getItem(LS.theme)) updateThemeIcon();
});

/* ---------- boot ---------- */
(async function init(){
  // Thema vóór render toepassen om kleuren-flicker te voorkomen.
  applyTheme(localStorage.getItem(LS.theme));   // null = volg systeem
  $("#themetoggle")?.addEventListener("click", toggleTheme);

  STATE.favs = loadFavs();
  STATE.tab  = localStorage.getItem(LS.tab) || "daily";

  // 1) embedded data wins (used by --bundle output)
  let data = (typeof window.__EMBEDDED_DATA__ !== "undefined") ? window.__EMBEDDED_DATA__ : null;
  // 2) try fetch (works when served via http(s))
  if (!data) data = await tryFetchLocal();
  // 3) fall back to localStorage cache
  if (!data) data = loadCachedData();

  if (data){
    STATE.data = data;
    // also refresh cache if fetch succeeded
    saveCachedData(data);
  }
  render();
})();
</script>
